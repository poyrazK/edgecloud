name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ============================================================
  # RUST-LINT — Fast check/lint jobs
  # ============================================================
  rust-lint:
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: "1"
      RUSTFLAGS: "-C opt-level=0 -C debuginfo=0 -C link-arg=-fuse-ld=mold"
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang mold

      - name: Generate Cargo.lock
        run: cargo generate-lockfile || true

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      # .cargo/config.toml sets build.rustc-wrapper = "sccache", so
      # every cargo invocation in this job needs the wrapper on PATH.
      # Install it once per job, then cache its store across runs so
      # cache-friendly crates (wasmtime, tree-sitter, wit-bindgen)
      # hit a warm cache instead of recompiling from scratch.
      - name: Install sccache (rustc wrapper)
        uses: ./.github/actions/install-sccache

      - name: Install rustfmt
        run: rustup component add rustfmt

      - name: Run rustfmt
        run: cargo fmt --check --all

      - name: Install clippy
        run: rustup component add clippy

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Install cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        env:
          # cargo-deny-action runs cargo inside a sandboxed Docker
          # container. The container reads .cargo/config.toml from
          # the volume mount, which sets build.rustc-wrapper =
          # "sccache" — but sccache is not installed inside the
          # container, so cargo aborts with
          # `could not execute process sccache ... (never executed)`.
          # Override at step scope (env vars beat config files in
          # cargo's precedence) to disable the wrapper for this step.
          CARGO_BUILD_RUSTC_WRAPPER: ""
        with:
          command: check
          manifest-path: Cargo.toml

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Run cargo audit
        run: cargo audit || true

  # ============================================================
  # RUST-TEST — Run cargo nextest
  # ============================================================
  rust-test:
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: "1"
      RUSTFLAGS: "-C opt-level=0 -C debuginfo=0 -C link-arg=-fuse-ld=mold"
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang mold

      - name: Generate Cargo.lock
        run: cargo generate-lockfile || true

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      # See rust-lint for the why; sccache is needed because
      # .cargo/config.toml wraps rustc with it unconditionally.
      - name: Install sccache (rustc wrapper)
        uses: ./.github/actions/install-sccache

      - name: Install cargo-nextest
        uses: taiki-e/install-action@cargo-nextest

      - name: Run tests (nextest)
        run: cargo nextest run --workspace

  # ============================================================
  # RUST-JS-BUILD — Issue #423: exercise `edge build --lang=js`
  # end-to-end on a fresh ubuntu-latest. Verifies the vendored
  # WASI Preview 1 reactor adapter's SHA-256 and confirms
  # `edge-cli build --lang=js` resolves the adapter and core
  # wasm paths against a fresh CARGO_HOME (so any adapter
  # resolution via the registry fallback is impossible, proving
  # the vendored file is genuinely the canonical source).
  # ============================================================
  rust-js-build:
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: "1"
      RUSTFLAGS: "-C opt-level=0 -C debuginfo=0 -C link-arg=-fuse-ld=mold"
      # CARGO_HOME is intentionally NOT set at job scope — leaving it
      # unset lets the runner use its default $HOME/.cargo so the
      # `cargo install --root "$CARGO_HOME"` + `Expose CLI tools on
      # PATH` steps land edge-cli + wasm-tools in a known location.
      # The build step below overrides CARGO_HOME with a fresh tmpdir
      # to prove the vendored adapter is genuinely canonical (the
      # registry fallback would only fire if both $EDGE_JS_WASI_ADAPTER
      # and the vendored file were missing — and they're not).
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # clang + mold are needed by edge-js-runtime's rquickjs-sys
      # (auto-stages wasi-sdk on first build) and the linker arg.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang mold

      - name: Generate Cargo.lock
        run: cargo generate-lockfile || true

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      # See rust-lint for the why; sccache is needed because
      # .cargo/config.toml wraps rustc with it unconditionally.
      - name: Install sccache (rustc wrapper)
        uses: ./.github/actions/install-sccache

      - name: Add wasm32-wasip1 target
        run: rustup target add wasm32-wasip1

      # Node 24 is the runner default; per CLAUDE.md we omit
      # node-version so CI tracks upstream. npm ci against the
      # committed samples/hello-js-ws/package-lock.json (issue
      # #423) makes this hermetic.
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          cache: npm
          cache-dependency-path: samples/hello-js-ws/package-lock.json

      - name: Install JS dependencies
        working-directory: samples/hello-js-ws
        run: npm ci

      - name: Install edge CLI
        # Use $HOME/.cargo explicitly (not $CARGO_HOME): GitHub-hosted
        # runners do NOT preset CARGO_HOME, so an unset $CARGO_HOME
        # expands to "" and `cargo install --root ""` lands binaries
        # under ./bin/. Same root cause as the pre-fix preview.yml
        # `edge-cli: command not found` symptom (CLAUDE.md line 114).
        run: cargo install --path ./edge-cli --locked --root "$HOME/.cargo"

      - name: Install wasm-tools
        run: cargo install wasm-tools --version 1.252.0 --locked --root "$HOME/.cargo"

      - name: Expose CLI tools on PATH
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      # SHA-256 check on the vendored adapter BEFORE the build —
      # a missing or drifted file fails fast, before the slow
      # rquickjs-sys wasi-sdk staging step.
      - name: Verify vendored WASI adapter checksum
        working-directory: edge-cli/adapters
        run: sha256sum -c SHA256SUMS

      # Build against a clean CARGO_HOME so the `cargo install
      # wasm-tools` step above can't have populated the registry
      # with a `wasi-preview1-component-adapter-provider-*` crate
      # that would mask a missing vendored adapter via the
      # registry-glob fallback. Proves the vendored file is
      # genuinely the source on a fresh clone.
      - name: Build JS sample with vendored adapter
        working-directory: samples/hello-js-ws
        env:
          # CARGO_HOME overridden to a fresh tmpdir so the `cargo
          # install wasm-tools` step above can't have populated the
          # registry with a `wasi-preview1-component-adapter-provider-*`
          # crate that would mask a missing vendored adapter via
          # the registry-glob fallback. Proves the vendored file
          # is genuinely the source on a fresh clone.
          CARGO_HOME: ${{ runner.temp }}/edgecloud-js-build-cargo-home
          # Override the job-scope RUSTFLAGS: the wasm32-wasip1
          # target uses rust-lld, which rejects `-fuse-ld=mold`
          # (`unknown argument: -fuse-ld=mold`). The flag only
          # affects the native-toolchain jobs (rust-test, etc.).
          RUSTFLAGS: "-C opt-level=0 -C debuginfo=0"
        run: |
          mkdir -p "$CARGO_HOME"
          edge-cli build --lang=js

  # ============================================================
  # RUST-SEMVER — Run cargo-semver-checks
  # ============================================================
  rust-semver:
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: "1"
      RUSTFLAGS: "-C opt-level=0 -C debuginfo=0 -C link-arg=-fuse-ld=mold"
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang mold

      - name: Generate Cargo.lock
        run: cargo generate-lockfile || true

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      # See rust-lint for the why; sccache is needed because
      # .cargo/config.toml wraps rustc with it unconditionally.
      - name: Install sccache (rustc wrapper)
        uses: ./.github/actions/install-sccache

      - name: Install cargo-semver-checks
        uses: taiki-e/install-action@cargo-semver-checks

      - name: Run cargo-semver-checks
        run: cargo semver-checks check-release --workspace --baseline-rev origin/main

  # ============================================================
  # RUST-NIGHTLY — Run nightly-only analyses (udeps, geiger)
  # ============================================================
  rust-nightly:
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: "1"
      RUSTFLAGS: "-C opt-level=0 -C debuginfo=0 -C link-arg=-fuse-ld=mold"
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang mold

      - name: Generate Cargo.lock
        run: cargo generate-lockfile || true

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      # See rust-lint for the why; sccache is needed because
      # .cargo/config.toml wraps rustc with it unconditionally.
      # Note: the nightly toolchain below uses a SEPARATE rustc binary
      # (via `cargo +nightly`), so it does NOT pick up the wrapper
      # unless we explicitly point RUSTC_WRAPPER at sccache too. Export
      # CARGO_BUILD_RUSTC_WRAPPER (the env-var equivalent of
      # build.rustc-wrapper) so the nightly toolchain also routes
      # through sccache. The nightly toolchain hash is part of the
      # sccache cache key, so stable/nightly caches don't trample
      # each other.
      - name: Install sccache (rustc wrapper)
        uses: ./.github/actions/install-sccache
        with:
          cache-key-prefix: 'sccache-edgecloud-nightly'

      - name: Force nightly rustc invocations through sccache
        # CARGO_BUILD_RUSTC_WRAPPER is the documented env-var
        # override for .cargo/config.toml's build.rustc-wrapper;
        # the nightly cargo invocation below re-reads config and
        # would otherwise revert to a non-wrapped rustc.
        run: |
          echo "CARGO_BUILD_RUSTC_WRAPPER=$(which sccache)" >> "$GITHUB_ENV"
          echo "RUSTC_WRAPPER=$(which sccache)" >> "$GITHUB_ENV"
          sccache --version

      - name: Install Rust Nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-udeps
        uses: taiki-e/install-action@cargo-udeps

      - name: Run cargo-udeps
        run: cargo +nightly udeps --workspace --all-targets

      - name: Install cargo-geiger
        uses: taiki-e/cache-cargo-install-action@v2
        with:
          tool: cargo-geiger

      - name: Run cargo-geiger
        run: cargo geiger || true

  # ============================================================
  # OPENAPI-VALIDATE — verify all mux routes are covered by the spec
  # ============================================================
  openapi-validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edge-control-plane
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        # setup-go@v6 hard-sets GOTOOLCHAIN=local (v5 used `auto`),
        # which blocks the silent toolchain auto-upgrade that used to
        # paper over a go-version mismatch. edge-control-plane/go.mod
        # requires go >= 1.25.0, so this job must pin a matching Go
        # explicitly — otherwise `go run` fails with
        # `go.mod requires go >= 1.25.0 (running go 1.23.12; ...)`.
        # The other Go jobs (go-fmt, golangci-lint, go-test,
        # go-test-integration) already pin 1.25.0; this brings
        # openapi-validate in line.
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.0'

      - name: Validate spec coverage
        run: go run ./scripts/openapi_check.go

  # ============================================================
  # TS-CLIENT — generate and diff TypeScript client from OpenAPI spec
  # ============================================================
  ts-client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edge-control-plane
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        # setup-node@v5 runs on Node 24 (silences the runner's
        # Node-20 deprecation warning). The ts-client job never
        # actually invokes npm/yarn/pnpm — it only needs the Node
        # toolchain loaded so that bash + git diff work in the
        # right environment. We omit `node-version:` so the action
        # defaults to the runner's Node (24); `package-manager-cache`
        # is set to false explicitly so v5's auto-cache-by-packageManager
        # heuristic is a no-op even though there's no package.json
        # in edge-control-plane/.
        uses: actions/setup-node@v5
        with:
          package-manager-cache: false

      - name: Generate TypeScript client
        run: bash ./scripts/generate_tsc.sh

      - name: Check for drift
        run: git diff --exit-code internal/generated/api-types.ts

  # ============================================================
  # GO-FMT — gofmt on edge-control-plane
  # ============================================================
  go-fmt:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edge-control-plane
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.0'

      - name: Run gofmt
        run: go fmt ./...

  # ============================================================
  # GOLANGCI-LINT — lint edge-control-plane Go code
  # ============================================================
  golangci-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edge-control-plane
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.0'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          install-mode: goinstall
          working-directory: edge-control-plane

  # ============================================================
  # GO-TEST — go test on edge-control-plane
  # ============================================================
  go-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edge-control-plane
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.0'

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod/
          key: go-mod-${{ runner.os }}-${{ hashFiles('**/go.sum') }}

      - name: Run go test
        run: go test -coverprofile=cover.out -covermode=atomic ./...

      - name: Coverage summary
        run: go tool cover -func=cover.out

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v5
        with:
          name: go-cover
          path: cover.out

  # ============================================================
  # GO-TEST-INTEGRATION — migrations roundtrip (postgres)
  # ============================================================
  # Exercises every *.sql file in edge-control-plane/migrations/
  # against a real Postgres via testcontainers. Catches malformed
  # rubenv/sql-migrate markers, CREATE INDEX CONCURRENTLY in a
  # default-wrapped transaction (migrate.go:540-548), and *.up.sql
  # / ↓down.sql asymmetries. Build-tag-gated so the fast `go-test`
  # job stays pure-sqlmock.
  #
  # Uses services: postgres (pre-cached image, ~6s cold start)
  # instead of docker:dind — no privileged container, no dind
  # daemon-shared-state flake.
  go-test-integration:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edge-control-plane
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: edgecloud_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d edgecloud_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_HOST: localhost
      DATABASE_PORT: "5432"
      DATABASE_USER: test
      DATABASE_PASSWORD: test
      DATABASE_NAME: edgecloud_test
      DATABASE_SSLMODE: disable
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.0'

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod/
          key: go-mod-${{ runner.os }}-${{ hashFiles('**/go.sum') }}

      - name: Run migration roundtrip test
        run: go test -tags=integration -v -count=1 ./migrations/... 2>&1 | tee test-logs.txt

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: go-integration-logs
          path: edge-control-plane/test-logs.txt

  # ============================================================
  # WIT-DRIFT-CHECK — keep the vendored WIT tree in sync
  # ============================================================
  # The CP's Rust migration path (issue #415) embeds the canonical
  # WIT tree at edge-control-plane/internal/service/wit/ so the
  # binary is self-contained at runtime. The canonical source
  # remains at the top-level wit/ directory (promoted in PR #414).
  # This job fails if the two diverge so the vendored copy can't
  # silently rot.
  wit-drift-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Diff canonical vs vendored WIT
        run: |
          # Exclude embed.go — it's the Go embed shim, not part of
          # the canonical WIT tree (which lives at the top-level
          # wit/ directory). Without --exclude, the drift check
          # would always fail because the vendored copy has one
          # extra file.
          if ! diff -r --exclude embed.go wit edge-control-plane/internal/service/wit > wit-drift.txt; then
            echo "::error::wit-drift-check failed: the vendored copy under edge-control-plane/internal/service/wit is out of sync with the canonical source under wit/. Re-sync via 'cp -R wit/. edge-control-plane/internal/service/wit/' and commit the result. Full diff:"
            cat wit-drift.txt
            exit 1
          fi

  # ============================================================
  # TYPOS — spell check source files
  # ============================================================
  typos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check for typos
        uses: crate-ci/typos@v1

  # ============================================================
  # COVERAGE-RUST — cargo-llvm-cov for all crates
  # ============================================================
  coverage-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Generate Cargo.lock
        run: cargo generate-lockfile || true

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Run coverage
        run: cargo llvm-cov --lcov --output-path lcov-rust.info --workspace || true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v5
        with:
          name: lcov-rust
          path: lcov-rust.info

  # ============================================================
  # CLI-JS-SMOKE — end-to-end build of the JS sample
  # (issue #423 / #424). Skipped on PRs that don't touch the JS
  # pipeline (edge-cli/, edge-js-runtime/, edge-js-sdk/, wit/, this
  # workflow) so the cost (~5-10 min for `cargo install wasm-tools`
  # on a cold cache) is only paid when relevant. Wired via
  # `dorny/paths-filter` so the skip is real, not a comment-only
  # claim.
  # ============================================================
  cli-js-smoke:
    runs-on: ubuntu-latest
    # `.cargo/config.toml` sets `build.rustc-wrapper = "sccache"`.
    # sccache is not installed on a fresh runner, so the `cargo
    # install` / `cargo build` invocations would fail with
    # `could not execute process \`sccache ...\`` (the same
    # failure mode that `cargo-deny-action` works around in
    # `rust-lint`). Set the env override at job scope — env vars
    # beat config files in cargo's precedence. We don't need
    # sccache here because this job only does two `cargo install`
    # invocations + one edge-cli build; `Swatinem/rust-cache` is
    # for the larger `rust-test` / `rust-lint` runs.
    env:
      CARGO_BUILD_RUSTC_WRAPPER: ""
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Path filter: only run the smoke job when the change touches
      # the JS surface. The `filter` step below evaluates the changed
      # file list against these globs and exports `changes == 'true'`
      # when at least one matches. `dorny/paths-filter` defaults to
      # "any match" semantics for OR-style filtering. We list the
      # workflow file itself (`**.yml`) so edits here re-trigger the
      # smoke job — otherwise a future fix to this file would be
      # unverified.
      #
      # Must run AFTER `actions/checkout` — on `push` events the
      # dorny action's internal `git branch --show-current` runs in
      # `${{ github.workspace }}`, which is an empty dir until
      # checkout populates it. On PR events this is masked because
      # the workspace is pre-checked by the Actions runtime, but on
      # `push` (e.g., a main merge) the job fails with rc=128
      # `fatal: not a git repository` (observed on 2026-07-10
      # post-PR-#498).
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            changes:
              - 'edge-cli/**'
              - 'edge-js-runtime/**'
              - 'edge-js-sdk/**'
              - 'wit/**'
              - 'samples/hello-js/**'
              - '.github/workflows/ci.yml'

      # Skip the rest of the job when the diff doesn't touch JS.
      # `if:` on every subsequent step would be more verbose; the
      # early-exit step surfaces a clear "skipped (no JS changes)"
      # message in the run summary and is the pattern used elsewhere
      # in this workflow.
      - name: Skip — no JS-surface changes
        if: steps.changes.outputs.changes != 'true'
        run: |
          echo "cli-js-smoke: skipped (no changes under edge-cli/, edge-js-runtime/, edge-js-sdk/, wit/, samples/hello-js/, or this workflow)"
          exit 0

      - name: Install Rust toolchain (wasm32-wasip2)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2

      - name: Install Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install wasm-tools 1.252.x
        # Pin to ^1.252 to match the version scripts/dev-install.sh
        # and .github/workflows/preview.yml use. wasm-tools is
        # required by the Rust guest pipeline (`edge build --lang=rust`'s
        # wrap step), `edge-migrate`, the worker fixture build, and
        # the Go control plane's `wrapAsComponent` — NOT by the JS
        # pipeline anymore (the wasip2 cargo target emits a complete
        # component, no wrap). `cargo install --locked` pins the
        # dependency graph; the `target-dir` override keeps the
        # install out of the project's target/ tree.
        run: |
          cargo install wasm-tools --locked --version '^1.252' \
            --root "$HOME/.cargo"

      - name: Build + install edge
        # Build from source rather than relying on a published binary
        # so the smoke tests the exact CLI the next dev will get when
        # they pull the branch. The `edge-cli` package declares a
        # `[[bin]] name = "edge"` (see edge-cli/Cargo.toml), so
        # `cargo install` produces `$root/bin/edge`. That dir is NOT
        # on `$PATH` by default in CI; append it to `$GITHUB_PATH`
        # (the same trick `.github/actions/deploy-preview` uses, per
        # CLAUDE.md).
        run: |
          cargo install --path edge-cli --locked --root "$HOME/.cargo"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Build samples/hello-js
        # The full happy-path the user takes: `npm install` resolves
        # `@edgecloud/sdk` from npm via the `^0.2.0` pin in
        # samples/hello-js/package.json, then `edge build --lang=js`
        # bundles src/handler.js and builds edge-js-runtime directly
        # for `wasm32-wasip2` (no `--adapt` wrap needed — the wasip2
        # cargo target emits a complete WASI Preview 2 component
        # natively). The end-to-end build is the regression check —
        # the unit tests in edge-cli/src/commands/init.rs only cover
        # the template shape, not the build itself.
        #
        # The SDK isn't on the public npm registry yet, so this job
        # exercises the install path against a local tarball via
        # `npm pack edge-js-sdk/`. That validates the *exact* bytes
        # an end user would receive when the release manager runs
        # `npm publish --access public` from edge-js-sdk/, without
        # requiring CI to own npm credentials. When the package is
        # published, swap the tarball install for a plain `npm
        # install` (the `^0.2.0` pin resolves the same way either
        # way).
        run: |
          # Build the in-tree SDK into a tarball the npm install path
          # can consume. `npm pack` resolves the workspace's
          # `edge-js-sdk/package.json` and writes a
          # `edgecloud-sdk-0.2.0.tgz` file. Tarball shape is exactly
          # what `npm publish` would upload.
          echo "Packing @edgecloud/sdk from edge-js-sdk/…"
          (cd edge-js-sdk && npm pack --silent)
          sdk_tarball="$(ls edge-js-sdk/edgecloud-sdk-*.tgz | head -1)"
          test -n "$sdk_tarball" || { echo "::error::npm pack produced no tarball"; exit 1; }
          echo "  SDK tarball: $sdk_tarball"

          # Install in samples/hello-js/ with the tarball swapped in
          # for the npm registry. The `package.json` `^0.2.0` pin is
          # preserved (this only redirects the resolution source).
          (cd samples/hello-js && npm install --no-save --no-audit --no-fund "$GITHUB_WORKSPACE/$sdk_tarball")
          (cd samples/hello-js && npm ls @edgecloud/sdk)

          (cd samples/hello-js && edge build --lang=js)
          # The CLI's path_for("js") returns target/javy/<name>.wasm
          # (see edge-cli/src/commands/build.rs:89-104). The artifact
          # is the user-visible deliverable; assert it exists.
          test -f samples/hello-js/target/javy/hello-js.wasm
          # And that it's a valid wasm32 component (wasm-tools can
          # extract the WIT to verify).
          wasm-tools component wit samples/hello-js/target/javy/hello-js.wasm | grep -q 'wasi:http/incoming-handler@0.2.1'
