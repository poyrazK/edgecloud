name: CI

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main, release/*]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ============================================================
  # FMT — rustfmt on all crates
  # ============================================================
  fmt:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate: [edge-runtime, edge-cli, edge-worker]
    steps:
      - uses: actions/checkout@v4

      - name: Generate Cargo.lock
        run: |
          cargo generate-lockfile --manifest-path edge-cli/Cargo.toml || true
          cargo generate-lockfile --manifest-path edge-worker/Cargo.toml || true

      - name: Install rustfmt
        run: rustup component add rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry/index/
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache target dir
        uses: actions/cache@v4
        with:
          path: target/
          key: cargo-target-${{ matrix.crate }}-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Run rustfmt
        run: cargo fmt --check --manifest-path ${{ matrix.crate }}/Cargo.toml

  # ============================================================
  # CLIPPY — clippy on all crates
  # ============================================================
  clippy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate: [edge-runtime, edge-cli, edge-worker]
    steps:
      - uses: actions/checkout@v4

      - name: Generate Cargo.lock
        run: |
          cargo generate-lockfile --manifest-path edge-cli/Cargo.toml || true
          cargo generate-lockfile --manifest-path edge-worker/Cargo.toml || true

      - name: Install clippy
        run: rustup component add clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry/index/
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo bin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/
          key: cargo-bin-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache target dir
        uses: actions/cache@v4
        with:
          path: target/
          key: cargo-target-${{ matrix.crate }}-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Run clippy
        run: cargo clippy --manifest-path ${{ matrix.crate }}/Cargo.toml -- -D warnings

  # ============================================================
  # AUDIT — cargo audit on all crates (cached binary)
  # ============================================================
  audit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate: [edge-runtime, edge-cli, edge-worker]
    steps:
      - uses: actions/checkout@v4

      - name: Generate Cargo.lock
        run: |
          cargo generate-lockfile --manifest-path edge-cli/Cargo.toml || true
          cargo generate-lockfile --manifest-path edge-worker/Cargo.toml || true

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry/index/
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo bin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/
          key: cargo-bin-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo-audit binary
        id: cache-audit
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-audit-${{ runner.os }}-

      - name: Install cargo-audit
        if: steps.cache-audit.outputs.cache-hit != 'true'
        run: cargo install cargo-audit --force

      - name: Run cargo audit
        run: cargo audit --manifest-path ${{ matrix.crate }}/Cargo.toml || true

  # ============================================================
  # TEST — cargo test on all crates
  # ============================================================
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate: [edge-runtime, edge-cli, edge-worker]
    steps:
      - uses: actions/checkout@v4

      - name: Generate Cargo.lock
        run: |
          cargo generate-lockfile --manifest-path edge-cli/Cargo.toml || true
          cargo generate-lockfile --manifest-path edge-worker/Cargo.toml || true

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry/index/
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo bin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/
          key: cargo-bin-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache target dir
        uses: actions/cache@v4
        with:
          path: target/
          key: cargo-target-${{ matrix.crate }}-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test --manifest-path ${{ matrix.crate }}/Cargo.toml -- --skip test_error_field_populated_on_network_failure

  # ============================================================
  # TEST-EDGE-WORKER — integration tests for edge-worker (skipped in CI)
  # ============================================================
  test-edge-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Cargo.lock
        run: |
          cargo generate-lockfile --manifest-path edge-worker/Cargo.toml || true

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry/index/
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo bin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/
          key: cargo-bin-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache target dir
        uses: actions/cache@v4
        with:
          path: target/
          key: cargo-target-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests (skips integration tests in CI)
        run: |
          SKIP_INTEGRATION_TESTS=1 cargo test --manifest-path edge-worker/Cargo.toml -- --skip test_error_field_populated_on_network_failure

  # ============================================================
  # GO-FMT — gofmt on edge-control-plane
  # ============================================================
  go-fmt:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edge-control-plane
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Run gofmt
        run: go fmt ./...

  # ============================================================
  # GO-VET — go vet on edge-control-plane
  # ============================================================
  go-vet:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edge-control-plane
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Run go vet
        run: go vet ./...

  # ============================================================
  # GO-TEST — go test on edge-control-plane
  # ============================================================
  go-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edge-control-plane
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod/
          key: go-mod-${{ runner.os }}-${{ hashFiles('**/go.sum') }}

      - name: Run go test
        run: go test ./...
