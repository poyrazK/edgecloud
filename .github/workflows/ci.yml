name: CI

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - tool: rustfmt
            command: fmt --check
          - tool: clippy
            command: clippy -- -D warnings
          - tool: audit
            command: audit

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore working tree
        run: git reset --hard

      - name: Generate Cargo.lock
        run: |
          cargo generate-lockfile --manifest-path edge-runtime/Cargo.toml || true
          cargo generate-lockfile --manifest-path edge-worker/Cargo.toml || true

      - name: Install ${{ matrix.tool }}
        run: |
          case ${{ matrix.tool }} in
            rustfmt) rustup component add rustfmt ;;
            clippy) rustup component add clippy ;;
            audit)
              curl -LsSf https://github.com/rustsec/rustsec/releases/download/cargo-audit%2Fv0.22.2/cargo-audit-x86_64-unknown-linux-gnu-v0.22.2.tgz | tar -xz -C $HOME/.cargo/bin
              chmod +x $HOME/.cargo/bin/cargo-audit
              ;;
          esac

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry/index/
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo bin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/
          key: cargo-bin-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache target dir
        uses: actions/cache@v4
        with:
          path: target/
          key: cargo-target-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Run ${{ matrix.tool }}
        run: |
          if [ "${{ matrix.tool }}" = "audit" ]; then
            cargo audit --manifest-path edge-runtime/Cargo.toml || true
          else
            cargo ${{ matrix.command }} --manifest-path edge-runtime/Cargo.toml
          fi

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore working tree
        run: git reset --hard

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry/index/
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo bin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/
          key: cargo-bin-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache target dir
        uses: actions/cache@v4
        with:
          path: target/
          key: cargo-target-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test --manifest-path edge-runtime/Cargo.toml

  test-edge-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore working tree
        run: git reset --hard

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry/index/
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo bin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/
          key: cargo-bin-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache target dir
        uses: actions/cache@v4
        with:
          path: target/
          key: cargo-target-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: |
          SKIP_INTEGRATION_TESTS=1 cargo test --manifest-path edge-worker/Cargo.toml
