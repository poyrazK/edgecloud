name: CI

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - tool: rustfmt
            command: fmt --check
          - tool: clippy
            command: clippy -- -D warnings
          - tool: audit
            command: audit

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Cargo.lock
        run: |
          cargo generate-lockfile --manifest-path edge-runtime/Cargo.toml || true
          cargo generate-lockfile --manifest-path edge-worker/Cargo.toml || true

      - name: Install ${{ matrix.tool }}
        run: |
          case ${{ matrix.tool }} in
            rustfmt) rustup component add rustfmt ;;
            clippy) rustup component add clippy ;;
          esac

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry/index/
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo bin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/
          key: cargo-bin-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache target dir
        uses: actions/cache@v4
        with:
          path: target/
          key: cargo-target-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Run ${{ matrix.tool }} (edge-runtime)
        if: matrix.tool != 'audit'
        run: cargo ${{ matrix.command }}
        working-directory: edge-runtime

      - name: Run ${{ matrix.tool }} (edge-worker)
        if: matrix.tool != 'audit'
        run: cargo ${{ matrix.command }}
        working-directory: edge-worker

      - name: Run audit
        if: matrix.tool == 'audit'
        run: |
          cargo install cargo-audit --locked
          cargo audit --manifest-path edge-runtime/Cargo.toml || true

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Cargo.lock
        run: |
          cargo generate-lockfile --manifest-path edge-runtime/Cargo.toml || true

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry/index/
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo bin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/
          key: cargo-bin-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache target dir
        uses: actions/cache@v4
        with:
          path: target/
          key: cargo-target-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test --manifest-path edge-runtime/Cargo.toml

  test-edge-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Cargo.lock
        run: |
          cargo generate-lockfile --manifest-path edge-worker/Cargo.toml || true

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry/index/
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo bin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/
          key: cargo-bin-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache target dir
        uses: actions/cache@v4
        with:
          path: target/
          key: cargo-target-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: |
          SKIP_INTEGRATION_TESTS=1 cargo test --manifest-path edge-worker/Cargo.toml
