name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - tool: rustfmt
            command: fmt --check
          - tool: clippy
            command: clippy -- -D warnings
          - tool: audit
            command: audit

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Debug before reset
        run: |
          echo "=== After checkout ==="
          ls edge-runtime/ 2>&1 || echo "NOT FOUND"
          git ls-files edge-runtime/ | head -3

      - name: Restore working tree
        run: git reset --hard

      - name: Debug after reset
        run: |
          echo "=== After git reset --hard ==="
          ls edge-runtime/ 2>&1 || echo "NOT FOUND"
          find edge-runtime/ -type f | head -5

      - name: Install ${{ matrix.tool }}
        run: |
          case ${{ matrix.tool }} in
            rustfmt) rustup component add rustfmt ;;
            clippy) rustup component add clippy ;;
            audit)
              curl -LsSf https://github.com/rustsec/rustsec/releases/download/cargo-audit%2Fv0.18.3/cargo-audit-x86_64-unknown-linux-gnu.tar.gz | tar -xz -C $HOME/.cargo/bin
              chmod +x $HOME/.cargo/bin/cargo-audit
              ;;
          esac

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry/index/
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo bin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/
          key: cargo-bin-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache target dir
        uses: actions/cache@v4
        with:
          path: target/
          key: cargo-target-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Run ${{ matrix.tool }}
        run: |
          if [ "${{ matrix.tool }}" = "audit" ]; then
            cargo audit --manifest-path edge-runtime/Cargo.toml || true
          else
            cargo ${{ matrix.command }} --manifest-path edge-runtime/Cargo.toml
          fi

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Debug after reset
        run: |
          echo "=== After git reset --hard ==="
          ls edge-runtime/ 2>&1 || echo "NOT FOUND"
          find edge-runtime/ -type f | head -5

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry/index/
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo bin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/
          key: cargo-bin-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache target dir
        uses: actions/cache@v4
        with:
          path: target/
          key: cargo-target-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test --manifest-path edge-runtime/Cargo.toml
