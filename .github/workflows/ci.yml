name: CI

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ============================================================
  # VALIDATE-RUST — Consolidated Rust validation per crate
  # ============================================================
  validate-rust:
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: "1"
      RUSTFLAGS: "-C opt-level=0 -C debuginfo=0 -C link-arg=-fuse-ld=mold"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang mold

      - name: Generate Cargo.lock
        run: cargo generate-lockfile || true

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install rustfmt
        run: rustup component add rustfmt

      - name: Run rustfmt
        run: cargo fmt --check --all

      - name: Install clippy
        run: rustup component add clippy

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Install cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          manifest-path: Cargo.toml

      - name: Install cargo-semver-checks
        uses: taiki-e/install-action@cargo-semver-checks

      - name: Run cargo-semver-checks
        run: cargo semver-checks check-release --workspace --baseline-rev origin/main

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Run cargo audit
        run: cargo audit || true

      - name: Install cargo-nextest
        uses: taiki-e/install-action@cargo-nextest

      - name: Run tests (nextest)
        run: cargo nextest run --workspace

      - name: Install Rust Nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-udeps
        uses: taiki-e/install-action@cargo-udeps

      - name: Run cargo-udeps
        run: cargo +nightly udeps --workspace --all-targets

      - name: Install cargo-geiger
        uses: taiki-e/cache-cargo-install-action@v2
        with:
          tool: cargo-geiger

      - name: Run cargo-geiger
        run: cargo geiger || true

  # ============================================================
  # OPENAPI-VALIDATE — verify all mux routes are covered by the spec
  # ============================================================
  openapi-validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edge-control-plane
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Validate spec coverage
        run: go run ./scripts/openapi_check.go

  # ============================================================
  # TS-CLIENT — generate and diff TypeScript client from OpenAPI spec
  # ============================================================
  ts-client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edge-control-plane
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate TypeScript client
        run: bash ./scripts/generate_tsc.sh

      - name: Check for drift
        run: git diff --exit-code internal/generated/api-types.ts

  # ============================================================
  # GO-FMT — gofmt on edge-control-plane
  # ============================================================
  go-fmt:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edge-control-plane
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Run gofmt
        run: go fmt ./...

  # ============================================================
  # GOLANGCI-LINT — lint edge-control-plane Go code
  # ============================================================
  golangci-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edge-control-plane
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          install-mode: goinstall
          working-directory: edge-control-plane

  # ============================================================
  # GO-TEST — go test on edge-control-plane
  # ============================================================
  go-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edge-control-plane
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod/
          key: go-mod-${{ runner.os }}-${{ hashFiles('**/go.sum') }}

      - name: Run go test
        run: go test -coverprofile=cover.out -covermode=atomic ./...

      - name: Coverage summary
        run: go tool cover -func=cover.out

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-cover
          path: cover.out

  # ============================================================
  # TYPOS — spell check source files
  # ============================================================
  typos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for typos
        uses: crate-ci/typos@v1

  # ============================================================
  # COVERAGE-RUST — cargo-llvm-cov for all crates
  # ============================================================
  coverage-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate Cargo.lock
        run: cargo generate-lockfile || true

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Run coverage
        run: cargo llvm-cov --lcov --output-path lcov-rust.info --workspace || true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: lcov-rust
          path: lcov-rust.info

  # ============================================================
  # GO-TEST-INTEGRATION — autoscaler regression (issue #85)
  # ============================================================
  # Runs the build-tag-gated regression test that exercises the
  # live Service.Subscribe loop end-to-end against a real NATS
  # testcontainer. The headline acceptance criterion for #85 is
  # "100 RPS spike → new worker requested within 90s"; this job
  # pins that wiring on every PR.
  #
  # The test uses testcontainers-go which requires Go 1.24+ (the
  # core `go-test` job above stays on 1.23 since no other test
  # needs the newer runtime).
  go-test-integration:
    runs-on: ubuntu-latest
    services:
      docker:
        image: docker:dind
        options: --privileged
    defaults:
      run:
        working-directory: edge-control-plane
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod/
          key: go-mod-int-${{ runner.os }}-${{ hashFiles('**/go.sum') }}

      - name: Run autoscaler regression tests
        run: go test -tags=integration -v ./internal/autoscale/... -run TestRegression
