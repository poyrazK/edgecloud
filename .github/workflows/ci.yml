name: CI

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ============================================================
  # FMT — rustfmt on all crates
  # ============================================================
  fmt:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate: [edge-runtime, edge-cli, edge-worker, edge-ingress, edge-config, edge-migrate]
    steps:
      - uses: actions/checkout@v4

      - name: Generate Cargo.lock
        run: |
          cargo generate-lockfile --manifest-path edge-cli/Cargo.toml || true
          cargo generate-lockfile --manifest-path edge-worker/Cargo.toml || true
          cargo generate-lockfile --manifest-path edge-ingress/Cargo.toml || true
          cargo generate-lockfile --manifest-path edge-config/Cargo.toml || true
          cargo generate-lockfile --manifest-path edge-migrate/Cargo.toml || true

      - name: Install rustfmt
        run: rustup component add rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry/index/
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache target dir
        uses: actions/cache@v4
        with:
          path: target/
          key: cargo-target-${{ matrix.crate }}-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Run rustfmt
        run: cargo fmt --check --manifest-path ${{ matrix.crate }}/Cargo.toml --all

  # ============================================================
  # CLIPPY — clippy on all crates
  # ============================================================
  clippy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate: [edge-runtime, edge-cli, edge-worker, edge-ingress, edge-config, edge-migrate]
    steps:
      - uses: actions/checkout@v4

      - name: Generate Cargo.lock
        run: |
          cargo generate-lockfile --manifest-path edge-cli/Cargo.toml || true
          cargo generate-lockfile --manifest-path edge-worker/Cargo.toml || true
          cargo generate-lockfile --manifest-path edge-ingress/Cargo.toml || true
          cargo generate-lockfile --manifest-path edge-config/Cargo.toml || true
          cargo generate-lockfile --manifest-path edge-migrate/Cargo.toml || true

      - name: Install clippy
        run: rustup component add clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry/index/
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo bin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/
          key: cargo-bin-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache target dir
        uses: actions/cache@v4
        with:
          path: target/
          key: cargo-target-${{ matrix.crate }}-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Run clippy
        run: cargo clippy --manifest-path ${{ matrix.crate }}/Cargo.toml -- -D warnings

  # ============================================================
  # AUDIT — cargo audit on all crates (cached binary)
  # ============================================================
  audit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate: [edge-runtime, edge-cli, edge-worker, edge-ingress, edge-config, edge-migrate]
    steps:
      - uses: actions/checkout@v4

      - name: Generate Cargo.lock
        run: |
          cargo generate-lockfile --manifest-path edge-cli/Cargo.toml || true
          cargo generate-lockfile --manifest-path edge-worker/Cargo.toml || true
          cargo generate-lockfile --manifest-path edge-ingress/Cargo.toml || true
          cargo generate-lockfile --manifest-path edge-config/Cargo.toml || true
          cargo generate-lockfile --manifest-path edge-migrate/Cargo.toml || true

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry/index/
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo bin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/
          key: cargo-bin-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo-audit binary
        id: cache-audit
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-audit-${{ runner.os }}-

      - name: Install cargo-audit
        if: steps.cache-audit.outputs.cache-hit != 'true'
        run: cargo install cargo-audit --force

      - name: Run cargo audit
        run: cargo audit --manifest-path ${{ matrix.crate }}/Cargo.toml || true

  # ============================================================
  # TEST — cargo test on all crates
  # ============================================================
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate: [edge-runtime, edge-cli, edge-worker, edge-ingress, edge-config]
    steps:
      - uses: actions/checkout@v4

      - name: Generate Cargo.lock
        run: |
          cargo generate-lockfile --manifest-path edge-cli/Cargo.toml || true
          cargo generate-lockfile --manifest-path edge-worker/Cargo.toml || true
          cargo generate-lockfile --manifest-path edge-ingress/Cargo.toml || true
          cargo generate-lockfile --manifest-path edge-config/Cargo.toml || true
          cargo generate-lockfile --manifest-path edge-migrate/Cargo.toml || true

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry/index/
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo bin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/
          key: cargo-bin-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache target dir
        uses: actions/cache@v4
        with:
          path: target/
          key: cargo-target-${{ matrix.crate }}-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test --manifest-path ${{ matrix.crate }}/Cargo.toml

  # ============================================================
  # TEST-EDGE-WORKER — integration tests for edge-worker (skipped in CI)
  # ============================================================
  test-edge-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Cargo.lock
        run: |
          cargo generate-lockfile --manifest-path edge-worker/Cargo.toml || true

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry/index/
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo bin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/
          key: cargo-bin-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache target dir
        uses: actions/cache@v4
        with:
          path: target/
          key: cargo-target-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests (skips integration tests in CI)
        run: |
          SKIP_INTEGRATION_TESTS=1 cargo test --manifest-path edge-worker/Cargo.toml

  # ============================================================
  # TEST-EDGE-INGRESS — integration tests for edge-ingress (skipped in CI)
  # ============================================================
  test-edge-ingress:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Cargo.lock
        run: |
          cargo generate-lockfile --manifest-path edge-ingress/Cargo.toml || true

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry/index/
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo bin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/
          key: cargo-bin-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache target dir
        uses: actions/cache@v4
        with:
          path: target/
          key: cargo-target-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests (skips integration tests in CI)
        run: |
          SKIP_INTEGRATION_TESTS=1 cargo test --manifest-path edge-ingress/Cargo.toml

  # ============================================================
  # TEST-EDGE-MIGRATE-LIB — unit tests for edge-migrate-lib
  # ============================================================
  test-edge-migrate-lib:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Cargo.lock
        run: |
          cargo generate-lockfile --manifest-path edge-migrate/edge-migrate-lib/Cargo.toml || true

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry/index/
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo bin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/
          key: cargo-bin-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache target dir
        uses: actions/cache@v4
        with:
          path: target/
          key: cargo-target-edge-migrate-lib-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      # TODO: once a wasi-sdk CI image is available, install clang + wasi-sdk
      # and set `EDGE_TEST_CLANG=1` so the new `test_transform_e2e_wasi_stubs_compile`
      # regression net runs end-to-end on every PR. Tracked as a follow-up.
      - name: Run tests
        run: cargo test --manifest-path edge-migrate/edge-migrate-lib/Cargo.toml

  # ============================================================
  # TEST-EDGE-MIGRATE-BIN — integration tests for edge-migrate binary
  # ============================================================
  test-edge-migrate-bin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Cargo.lock
        run: |
          cargo generate-lockfile --manifest-path edge-migrate/edge-migrate-bin/Cargo.toml || true

      - name: Install system clang
        # System clang is sufficient for the bin's preprocessor test
        # skip path; EDGE_TEST_CLANG stays unset so the lib's gated
        # regression net is a no-op here.
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry/index/
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo bin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/
          key: cargo-bin-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache target dir
        uses: actions/cache@v4
        with:
          path: target/
          key: cargo-target-edge-migrate-bin-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test --manifest-path edge-migrate/edge-migrate-bin/Cargo.toml
  # OPENAPI-VALIDATE — verify all mux routes are covered by the spec
  # ============================================================
  openapi-validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edge-control-plane
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Validate spec coverage
        run: go run ./scripts/openapi_check.go

  # ============================================================
  # TS-CLIENT — generate and diff TypeScript client from OpenAPI spec
  # ============================================================
  ts-client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edge-control-plane
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate TypeScript client
        run: bash ./scripts/generate_tsc.sh

      - name: Check for drift
        run: git diff --exit-code internal/generated/api-types.ts

  # ============================================================
  # GO-FMT — gofmt on edge-control-plane
  # ============================================================
  go-fmt:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edge-control-plane
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Run gofmt
        run: go fmt ./...

  # ============================================================
  # GOLANGCI-LINT — lint edge-control-plane Go code
  # ============================================================
  golangci-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edge-control-plane
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          install-mode: goinstall
          working-directory: edge-control-plane

  # ============================================================
  # GO-TEST — go test on edge-control-plane
  # ============================================================
  go-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edge-control-plane
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod/
          key: go-mod-${{ runner.os }}-${{ hashFiles('**/go.sum') }}

      - name: Run go test
        run: go test ./...

  # ============================================================
  # CARGO-DENY — check Rust dependency licenses & advisories
  # ============================================================
  cargo-deny:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate: [edge-runtime, edge-cli, edge-worker, edge-ingress, edge-config, edge-migrate]
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          manifest-path: ${{ matrix.crate }}/Cargo.toml

  # ============================================================
  # TYPOS — spell check source files
  # ============================================================
  typos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for typos
        uses: crate-ci/typos@v1
