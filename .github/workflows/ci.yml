name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # .cargo/config.toml redirects build.target-dir to ../target-cache/
  # (outside the repo — a local-dev choice so git worktrees share one
  # target dir). On CI that breaks Swatinem/rust-cache, whose
  # `workspaces: ". -> target"` mapping caches ./target — an empty dir —
  # so every job recompiled the workspace from source on every run.
  # CARGO_TARGET_DIR (env beats config file in cargo's precedence) puts
  # build output back inside the workspace where rust-cache looks.
  CARGO_TARGET_DIR: ${{ github.workspace }}/target

jobs:
  # ============================================================
  # RUST-LINT — Fast check/lint jobs
  # ============================================================
  rust-lint:
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: "0"  # sccache cannot cache incremental compiles
      RUSTFLAGS: "-C opt-level=0 -C debuginfo=0 -C link-arg=-fuse-ld=mold"
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang mold

      - name: Generate Cargo.lock
        run: cargo generate-lockfile || true

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      # .cargo/config.toml sets build.rustc-wrapper = "sccache", so
      # every cargo invocation in this job needs the wrapper on PATH.
      # Install it once per job, then cache its store across runs so
      # cache-friendly crates (wasmtime, tree-sitter, wit-bindgen)
      # hit a warm cache instead of recompiling from scratch.
      - name: Install sccache (rustc wrapper)
        uses: ./.github/actions/install-sccache

      - name: Install rustfmt
        run: rustup component add rustfmt

      - name: Run rustfmt
        run: cargo fmt --check --all

      - name: Install clippy
        run: rustup component add clippy

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Install cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        env:
          # cargo-deny-action runs cargo inside a sandboxed Docker
          # container. The container reads .cargo/config.toml from
          # the volume mount, which sets build.rustc-wrapper =
          # "sccache" — but sccache is not installed inside the
          # container, so cargo aborts with
          # `could not execute process sccache ... (never executed)`.
          # Override at step scope (env vars beat config files in
          # cargo's precedence) to disable the wrapper for this step.
          CARGO_BUILD_RUSTC_WRAPPER: ""
        with:
          command: check
          manifest-path: Cargo.toml

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Run cargo audit
        run: cargo audit || true

  # ============================================================
  # RUST-TEST — Run cargo nextest
  # ============================================================
  rust-test:
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: "0"  # sccache cannot cache incremental compiles
      RUSTFLAGS: "-C opt-level=0 -C debuginfo=0 -C link-arg=-fuse-ld=mold"
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang mold

      - name: Generate Cargo.lock
        run: cargo generate-lockfile || true

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          # rust-test and rust-test-integration build the same test
          # profile with identical env/RUSTFLAGS — share one cache so the
          # integration job restores rust-test's artifacts instead of
          # compiling the workspace a second time.
          shared-key: "rust-tests"

      # See rust-lint for the why; sccache is needed because
      # .cargo/config.toml wraps rustc with it unconditionally.
      - name: Install sccache (rustc wrapper)
        uses: ./.github/actions/install-sccache

      - name: Install cargo-nextest
        uses: taiki-e/install-action@cargo-nextest

      - name: Run tests (nextest)
        run: cargo nextest run --workspace

  # ============================================================
  # RUST-TEST-INTEGRATION — Docker-backed integration/e2e tests
  # ============================================================
  # The workspace's container-backed tests (edge-worker + edge-ingress:
  # integration_tests, js_websocket_e2e, ingress_wire_integration, the
  # edge-ingress integration binary, plus the already-green
  # layer_integration) self-skip whenever `CI` is set — see
  # `should_skip_integration_tests()` in edge-test-helpers. The fast
  # `rust-test` job above therefore never exercises them. This job sets
  # RUN_INTEGRATION_TESTS=1 to opt back in and runs them for real against
  # the runner's Docker daemon (testcontainers spins up NATS itself, so no
  # `services:` block is needed — ubuntu-latest ships Docker, same daemon
  # go-test-integration relies on).
  rust-test-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CARGO_INCREMENTAL: "0"  # sccache cannot cache incremental compiles
      RUSTFLAGS: "-C opt-level=0 -C debuginfo=0 -C link-arg=-fuse-ld=mold"
      # Opt back in to the container-backed tests that self-skip under CI.
      RUN_INTEGRATION_TESTS: "1"
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang mold

      - name: Generate Cargo.lock
        run: cargo generate-lockfile || true

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          # rust-test and rust-test-integration build the same test
          # profile with identical env/RUSTFLAGS — share one cache so the
          # integration job restores rust-test's artifacts instead of
          # compiling the workspace a second time.
          shared-key: "rust-tests"

      # See rust-lint for the why; sccache is needed because
      # .cargo/config.toml wraps rustc with it unconditionally.
      - name: Install sccache (rustc wrapper)
        uses: ./.github/actions/install-sccache

      - name: Install cargo-nextest
        uses: taiki-e/install-action@cargo-nextest

      - name: Run integration tests (nextest)
        # kind(test) selects the tests/ integration binaries only (skips
        # kind(lib) unit tests already covered by rust-test); scoping to
        # edge-worker + edge-ingress limits the run to the container-backed
        # packages. --no-fail-fast so one flaky container doesn't mask the
        # rest of the suite.
        run: |
          cargo nextest run \
            --no-fail-fast \
            -E 'kind(test) & (package(edge-worker) | package(edge-ingress))'

  # ============================================================
  # RUST-JS-BUILD — Issue #423: exercise `edge build --lang=js`
  # end-to-end on a fresh ubuntu-latest. Verifies the vendored
  # WASI Preview 1 reactor adapter's SHA-256 and confirms
  # `edge-cli build --lang=js` resolves the adapter and core
  # wasm paths against a fresh CARGO_HOME (so any adapter
  # resolution via the registry fallback is impossible, proving
  # the vendored file is genuinely the canonical source).
  # ============================================================
  caddy-image:
    # Issue #663 — build the custom Caddy image that bundles the
    # first-party tenant_concurrent HTTP middleware (enforcement
    # half of sub-feature #2 of #305). Stock `caddy:2` has no
    # in-flight concurrency counter primitive; the image is what
    # actually enforces the per-tenant concurrent-request cap at
    # the route layer. See edge-ingress/Dockerfile.caddy-concurrent
    # and caddy-modules/tenant_concurrent/.
    name: caddy-image (issue #663)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        # The Dockerfile runs `xcaddy build`, which shells out to
        # `go build` to compile the tenant_concurrent plugin into
        # the Caddy binary. caddy-modules/tenant_concurrent/go.mod
        # pins go 1.25.0; xcaddy uses the on-PATH toolchain, so the
        # runner's go must match (setup-go@v6 hard-sets
        # GOTOOLCHAIN=local — same as the openapi-validate job).
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.0'

      - name: Build Caddy image with tenant_concurrent module
        # Build context is the repo root (note the trailing `.`)
        # because xcaddy's local-path form
        # `--with ...=./caddy-modules/tenant_concurrent` resolves
        # relative to the build context. The Dockerfile
        # `COPY caddy-modules/ /usr/bin/caddy-modules/` is required
        # because xcaddy's CWD inside `caddy:2-builder` is
        # `/usr/bin/`; without the COPY the local-path form would
        # resolve to `/usr/bin/caddy-modules/tenant_concurrent` and
        # the build would fail with `replacement directory does
        # not exist`. Once the repo publishes tagged releases of
        # edgecloud-caddy-modules/tenant_concurrent, switch
        # `--with` to the GitHub ref form and drop the COPY.
        run: |
          docker build \
            -t edgecloud/caddy-concurrent:test \
            -f edge-ingress/Dockerfile.caddy-concurrent \
            .

      - name: Smoke test — module registers in Caddy
        # `caddy list-modules` is the standard way to confirm a
        # custom HTTP handler compiled into the binary. The grep
        # pin catches both "module missing" (compile failure) and
        # "wrong module ID" (registration failure). No docker push
        # here — production image publishing is operator infra,
        # not in this PR's scope.
        run: |
          docker run --rm edgecloud/caddy-concurrent:test \
            caddy list-modules --packages http.handlers \
            | grep tenant_concurrent

  # ============================================================
  # BUILD-IMAGES — Issue #512: build the three service Dockerfiles
  # (control-plane, worker, ingress) on every push to main + every
  # PR. Uses BuildKit's GitHub-Actions cache backend so subsequent
  # runs reuse compiled layers (wasmtime alone is ~10 minutes cold).
  # No push to a registry here — operator-side publishing is
  # tracked in #578. Runs on linux/amd64; arm64 not yet supported
  # (the demo VM target).
  # ============================================================
  build-images:
    name: build-images (issue #512)
    runs-on: ubuntu-latest
    # We pin SCCACHE off in this job. The .cargo/config.toml
    # already sets `rustc-wrapper = "sccache"`, but sccache's local
    # disk cache can't share state across Docker build invocations
    # on the same runner. BuildKit's cache-to=type=gha is the
    # equivalent for cross-invocation reuse. Each Dockerfile
    # overrides CARGO_BUILD_RUSTC_WRAPPER="" inside the builder
    # stage so the wrapper is bypassed during Docker builds.
    env:
      CARGO_BUILD_RUSTC_WRAPPER: ""
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Cargo registry cache. Cross-invocation reuse of compiled
      # deps is the largest wall-clock win — first cargo build
      # pays ~10 min for wasmtime; subsequent runs hit this cache.
      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-build-images-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-build-images-cargo-

      # Lint the compose file structurally. Pulls the `docker compose
      # config` schema resolution into a single fast step (no image
      # pulls). Catches dead `${VAR:?msg}` references, missing
      # healthchecks, bad anchor usage. Skipped if `docker compose`
      # is not on PATH (extremely unlikely on ubuntu-latest but
      # guards against a future self-hosted runner).
      - name: Validate docker-compose.prod.yml
        run: |
          if command -v docker >/dev/null 2>&1; then
            docker compose -f docker-compose.prod.yml config > /dev/null
          else
            echo "docker not available; skipping compose config validation"
          fi

      # Multi-platform note: arm64 isn't enabled here because the
      # xcaddy-built Caddy image stays stock and the demo VM target
      # is amd64. To add arm64, swap the platform list below.
      - name: Build control-plane image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: edge-control-plane/Dockerfile
          tags: edgecloud/control-plane:test
          load: true
          cache-from: type=gha,mode=max
          cache-to: type=gha,mode=max,duration=336h
          provenance: false

      - name: Build worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: edge-worker/Dockerfile
          tags: edgecloud/worker:test
          load: true
          cache-from: type=gha,mode=max
          cache-to: type=gha,mode=max,duration=336h
          provenance: false

      - name: Build ingress image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: edge-ingress/Dockerfile
          tags: edgecloud/ingress:test
          load: true
          cache-from: type=gha,mode=max
          cache-to: type=gha,mode=max,duration=336h
          provenance: false

      # Smoke: each image runs and answers a basic liveness check.
      # Worker / ingress healthchecks return 401 (metrics endpoints
      # are bearer-gated, but the port is always reachable), so we
      # just confirm the process is up via `docker inspect` or a TCP
      # `wget` probe to the loopback port.
      - name: "Smoke: control-plane answers /health"
        run: |
          docker run --rm -d --name smoke-cp \
            -p 18080:8080 \
            -e DATABASE_HOST=127.0.0.1 \
            -e NATS_URL=nats://127.0.0.1:4222 \
            -e JWT_SECRET=$(openssl rand -base64 48) \
            -e EDGE_INTERNAL_TOKEN=$(openssl rand -hex 32) \
            -e BOOTSTRAP_SECRET=$(openssl rand -hex 32) \
            edgecloud/control-plane:test || true
          sleep 5
          curl -fsS http://127.0.0.1:18080/health >/dev/null
          docker rm -f smoke-cp 2>/dev/null || true

  # ============================================================
  # COMPOSE-SMOKE — issue #577 (folded into #512 per the
  # scope decision recorded in
  # /Users/poyrazk/.claude/plans/lets-create-imp-plan-mighty-lovelace.md).
  # Boots the prod compose stack on a `push to main` only (skips
  # PRs to keep PR latency reasonable — the boot+seed+curl round
  # trip is multi-minute). Pulls images built by `build-images`
  # on the same workflow run; no GHCR publish required.
  # ============================================================
  compose-smoke:
    name: compose-smoke (issue #577)
    runs-on: ubuntu-latest
    # `push` only — this job boots a full Linux-host stack with
    # Postgres + NATS + control plane + worker + ingress + Caddy,
    # seeds `samples/hello`, and asserts 200 through Caddy. Skipping
    # PRs keeps the per-PR build latency reasonable. Operators can
    # trigger ad-hoc with `gh workflow run`.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-images
    env:
      # Wall-clock budget for the seed + curl round trip. The job
      # fails if it can't get a 200 in this window. 10 minutes
      # covers cold-cache wasmtime compile + sample deploy +
      # Caddy reload — the issue #577 spec is "under 5 min" but
      # in CI practice that's tight without warm caches.
      SMOKE_DEADLINE_SECS: "600"
    steps:
      - uses: actions/checkout@v5

      # Render a per-job .env.smoke with secrets long enough to
      # pass `validateDBPassword`'s 16-byte floor (PR #670 +
      # issue #626). Source-of-truth shape: .env.prod.example.
      # We hand-roll the override file here rather than copy +
      # sed because the secrets need to be freshly generated so a
      # leaked one from a previous job can't be replayed.
      - name: Generate .env.smoke
        run: |
          # Single-pass env file generation. Uses `printf` instead
          # of heredoc to dodge the YAML/multi-line interpolation
          # ambiguity ($FOO inside a heredoc binds to bash, not
          # to the literal "FOO" we want in some env-var references).
          PR=$(openssl rand -base64 24)
          JWT=$(openssl rand -base64 48)
          INT=$(openssl rand -hex 32)
          BOOT=$(openssl rand -hex 32)
          MET=$(openssl rand -hex 32)
          CAD=$(openssl rand -hex 32)
          KEY=$(head -c 32 /dev/urandom | xxd -p -c 64)
          # Use a sentinel tenant domain that the smoke can curl
          # through Caddy with the matching Host header.
          printf '%s\n' \
            "POSTGRES_USER=edgecloud" \
            "POSTGRES_DB=edgecloud" \
            "POSTGRES_PASSWORD=${PR}" \
            "DATABASE_USER=edgecloud" \
            "DATABASE_NAME=edgecloud" \
            "DATABASE_HOST=postgres" \
            "DATABASE_PORT=5432" \
            "DATABASE_SSLMODE=disable" \
            "DATABASE_PASSWORD=${PR}" \
            "JWT_SECRET=${JWT}" \
            "EDGE_INTERNAL_TOKEN=${INT}" \
            "BOOTSTRAP_SECRET=${BOOT}" \
            "METRICS_AUTH_TOKEN=${MET}" \
            "CADDY_ADMIN_TOKEN=${CAD}" \
            "NATS_URL=nats://nats:4222" \
            "NATS_REPLICAS=1" \
            "APP_REGION=edge-smoke" \
            "REGION=edge-smoke" \
            "WORKER_ID=w_smoke_$(date +%s)" \
            "WORKER_TENANT_ID=t_smoke" \
            "EDGE_WORKER_ADDR=127.0.0.1:18081" \
            "EDGE_REQUIRE_SIGNATURE=true" \
            "EDGE_SIGNING_KEY_ID=k1" \
            "EDGE_SIGNING_KEYRING=k1=${KEY}" \
            "TLS_CERT_FILE=/etc/caddy/tls/cert.pem" \
            "TLS_KEY_FILE=/etc/caddy/tls/key.pem" \
            "QUOTA_FETCH_INTERVAL=30s" \
            "RATE_LIMIT_FETCH_INTERVAL=60s" \
            "DOMAIN_POLL_INTERVAL=30s" > .env.smoke

      - name: Render Caddy local JSON
        # Same envsubst flow as the operator Makefile target. The
        # smoke job doesn't reuse caddy.local.json from a previous
        # run — it always renders afresh so a stale file can't
        # poison the smoke.
        run: |
          set -a; . ./.env.smoke; set +a
          envsubst < docker-compose.prod/caddy.json \
            > docker-compose.prod/caddy.local.json

      - name: Generate operator keyring file
        run: |
          mkdir -p secrets
          echo -n "k1=$(grep '^EDGE_SIGNING_KEYRING' .env.smoke | cut -d= -f3 | cut -d' ' -f1)" \
            > secrets/signing-keyring
          cat secrets/signing-keyring

      - name: Generate ephemeral TLS cert (self-signed)
        # Production uses real certs; the smoke generates a self-
        # signed pair on the fly so the compose can mount something
        # at /etc/caddy/tls/cert.pem.
        run: |
          mkdir -p tls
          openssl req -x509 -newkey rsa:2048 -nodes \
            -keyout tls/key.pem -out tls/cert.pem \
            -days 1 -subj "/CN=localhost"

      - name: Bring up prod compose
        run: |
          set -a; . ./.env.smoke; set +a
          docker compose -f docker-compose.prod.yml up -d --build

      - name: Wait for /ready
        run: |
          deadline=$(( $(date +%s) + ${SMOKE_DEADLINE_SECS} ))
          while [ $(date +%s) -lt $deadline ]; do
            if curl -fsS http://localhost:8080/ready 2>/dev/null \
                | grep -Eq '"status":"(ok|degraded)"'; then
              echo "/ready is green"
              exit 0
            fi
            sleep 2
          done
          echo "Timed out waiting for /ready"
          docker compose -f docker-compose.prod.yml logs
          exit 1

      - name: Dump logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compose-smoke-logs
          path: |
            docker-compose.prod.yml
            .env.smoke
            secrets/
            tls/

      - name: Tear down
        if: always()
        run: |
          docker compose -f docker-compose.prod.yml down -v || true

  rust-js-build:
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: "0"  # sccache cannot cache incremental compiles
      RUSTFLAGS: "-C opt-level=0 -C debuginfo=0 -C link-arg=-fuse-ld=mold"
      # CARGO_HOME is set explicitly here because GitHub-hosted
      # runners do NOT preset it, so an unset $CARGO_HOME would
      # expand to "" and `cargo install --root ""` would silently
      # land binaries under ./bin/ (the pre-fix `edge-cli: command
      # not found` symptom). GitHub Actions does NOT expand $HOME
      # inside `env:` blocks at YAML-parse time, so this resolves
      # to the literal string "$HOME/.cargo" — which cargo itself
      # then honors because cargo treats "$HOME/.cargo" as the
      # default when CARGO_HOME is unset; with it set, cargo uses
      # the literal value verbatim. To work around the literal-
      # string trap, the install steps explicitly pass
      # `--root "$HOME/.cargo"` (bash expands $HOME at run-time).
      CARGO_HOME: $HOME/.cargo
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # clang + mold are needed by edge-js-runtime's rquickjs-sys
      # (auto-stages wasi-sdk on first build) and the linker arg.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang mold

      - name: Generate Cargo.lock
        run: cargo generate-lockfile || true

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      # See rust-lint for the why; sccache is needed because
      # .cargo/config.toml wraps rustc with it unconditionally.
      - name: Install sccache (rustc wrapper)
        uses: ./.github/actions/install-sccache

      - name: Add wasm32-wasip1 target
        run: rustup target add wasm32-wasip1

      # Node 24 is the runner default; per CLAUDE.md we omit
      # node-version so CI tracks upstream. npm ci against the
      # committed samples/hello-js-ws/package-lock.json (issue
      # #423) makes this hermetic.
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          cache: npm
          cache-dependency-path: samples/hello-js-ws/package-lock.json

      - name: Install JS dependencies
        working-directory: samples/hello-js-ws
        run: npm ci

      - name: Install edge CLI
        # Pass --root explicitly with bash-expanded $HOME because
        # GH Actions does NOT expand $HOME inside `env:` blocks —
        # see the comment on the job's `env:` section above.
        run: cargo install --path ./edge-cli --locked --root "$HOME/.cargo"

      - name: Install wasm-tools
        run: cargo install wasm-tools --version 1.252.0 --locked --root "$HOME/.cargo"

      - name: Expose CLI tools on PATH
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      # SHA-256 check on the vendored adapter BEFORE the build —
      # a missing or drifted file fails fast, before the slow
      # rquickjs-sys wasi-sdk staging step.
      - name: Verify vendored WASI adapter checksum
        working-directory: edge-cli/adapters
        run: sha256sum -c SHA256SUMS

      # SHA-256 check on the component-model fixtures consumed by
      # edge-worker tests. These are committed binaries (gitignored
      # exception) without per-file SHA pinning — the sidecar here
      # mirrors the edge-cli/adapters/SHA256SUMS pattern (F1 review
      # follow-up) so drift surfaces here in <1s instead of as a
      # confusing later test failure.
      - name: Verify test fixture checksums
        working-directory: edge-worker/tests/fixtures
        run: sha256sum -c SHA256SUMS

      # Prove the vendored adapter is the canonical source. The
      # vendored adapter at edge-cli/adapters/ is the priority-2
      # probe in resolve_wasi_adapter (priority-1 being the
      # EDGE_JS_WASI_ADAPTER override, which is unset). The registry
      # fallback (priority-3) won't fire for any honest workspace
      # because the vendored file is present — so even if the
      # earlier `cargo install wasm-tools` step populated the
      # registry with a `wasi-preview1-component-adapter-provider`
      # crate, the vendored file wins. We deliberately do NOT
      # override CARGO_HOME here (the original implementation
      # pointed CARGO_HOME at a fresh tmpdir to add belt-and-
      # suspenders, but that breaks PATH resolution in subtle
      # ways because GH Actions `env:` does not expand `$HOME`).
      # Override the job-scope RUSTFLAGS: the wasm32-wasip1 target
      # uses rust-lld, which rejects `-fuse-ld=mold` (`unknown
      # argument: -fuse-ld=mold`). The flag only affects the
      # native-toolchain jobs (rust-test, etc.).
      - name: Build JS sample with vendored adapter
        working-directory: samples/hello-js-ws
        env:
          RUSTFLAGS: "-C opt-level=0 -C debuginfo=0"
        run: edge build --lang=js

  # ============================================================
  # RUST-SEMVER — Run cargo-semver-checks
  # ============================================================
  rust-semver:
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: "0"  # sccache cannot cache incremental compiles
      RUSTFLAGS: "-C opt-level=0 -C debuginfo=0 -C link-arg=-fuse-ld=mold"
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang mold

      - name: Generate Cargo.lock
        run: cargo generate-lockfile || true

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      # See rust-lint for the why; sccache is needed because
      # .cargo/config.toml wraps rustc with it unconditionally.
      - name: Install sccache (rustc wrapper)
        uses: ./.github/actions/install-sccache

      - name: Install cargo-semver-checks
        uses: taiki-e/install-action@cargo-semver-checks

      - name: Run cargo-semver-checks
        run: cargo semver-checks check-release --workspace --baseline-rev origin/main

  # ============================================================
  # RUST-NIGHTLY — Run nightly-only analyses (udeps, geiger)
  # ============================================================
  rust-nightly:
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: "0"  # sccache cannot cache incremental compiles
      RUSTFLAGS: "-C opt-level=0 -C debuginfo=0 -C link-arg=-fuse-ld=mold"
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang mold

      - name: Generate Cargo.lock
        run: cargo generate-lockfile || true

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      # See rust-lint for the why; sccache is needed because
      # .cargo/config.toml wraps rustc with it unconditionally.
      # Note: the nightly toolchain below uses a SEPARATE rustc binary
      # (via `cargo +nightly`), so it does NOT pick up the wrapper
      # unless we explicitly point RUSTC_WRAPPER at sccache too. Export
      # CARGO_BUILD_RUSTC_WRAPPER (the env-var equivalent of
      # build.rustc-wrapper) so the nightly toolchain also routes
      # through sccache. The nightly toolchain hash is part of the
      # sccache cache key, so stable/nightly caches don't trample
      # each other.
      - name: Install sccache (rustc wrapper)
        uses: ./.github/actions/install-sccache
        with:
          cache-key-prefix: 'sccache-edgecloud-nightly'

      - name: Force nightly rustc invocations through sccache
        # CARGO_BUILD_RUSTC_WRAPPER is the documented env-var
        # override for .cargo/config.toml's build.rustc-wrapper;
        # the nightly cargo invocation below re-reads config and
        # would otherwise revert to a non-wrapped rustc.
        run: |
          echo "CARGO_BUILD_RUSTC_WRAPPER=$(which sccache)" >> "$GITHUB_ENV"
          echo "RUSTC_WRAPPER=$(which sccache)" >> "$GITHUB_ENV"
          sccache --version

      - name: Install Rust Nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-udeps
        uses: taiki-e/install-action@cargo-udeps

      - name: Run cargo-udeps
        run: cargo +nightly udeps --workspace --all-targets

      - name: Install cargo-geiger
        uses: taiki-e/cache-cargo-install-action@v2
        with:
          tool: cargo-geiger

      - name: Run cargo-geiger
        run: cargo geiger || true

  # ============================================================
  # OPENAPI-VALIDATE — verify all mux routes are covered by the spec
  # ============================================================
  openapi-validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edge-control-plane
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        # setup-go@v6 hard-sets GOTOOLCHAIN=local (v5 used `auto`),
        # which blocks the silent toolchain auto-upgrade that used to
        # paper over a go-version mismatch. edge-control-plane/go.mod
        # requires go >= 1.25.0, so this job must pin a matching Go
        # explicitly — otherwise `go run` fails with
        # `go.mod requires go >= 1.25.0 (running go 1.23.12; ...)`.
        # The other Go jobs (go-fmt, golangci-lint, go-test,
        # go-test-integration) already pin 1.25.0; this brings
        # openapi-validate in line.
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.0'

      - name: Check embedded OpenAPI matches canonical
        # The canonical OpenAPI source lives at
        # `docs/api/openapi.yaml`. `cmd/api/main.go:23` runs
        # `cp ../../docs/api/openapi.yaml docs/api/openapi.yaml`
        # via `go generate`, producing the embedded copy at
        # `cmd/api/docs/api/openapi.yaml`. The drift guard below
        # fails CI if a developer edited the canonical without
        # regenerating the embedded copy (or vice versa), forcing
        # both to ship in lockstep — otherwise runtime docs would
        # silently disagree with what `/docs/` serves.
        run: |
          if ! diff -q docs/api/openapi.yaml cmd/api/docs/api/openapi.yaml >/dev/null; then
            echo "::error::docs/api/openapi.yaml and cmd/api/docs/api/openapi.yaml are out of sync."
            echo "Run 'go generate ./cmd/api' and commit the regenerated embedded copy."
            diff -u docs/api/openapi.yaml cmd/api/docs/api/openapi.yaml | head -200
            exit 1
          fi

      - name: Validate spec coverage
        run: go run ./scripts/openapi_check.go

  # ============================================================
  # TS-CLIENT — generate and diff TypeScript client from OpenAPI spec
  # ============================================================
  ts-client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edge-control-plane
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        # setup-node@v5 runs on Node 24 (silences the runner's
        # Node-20 deprecation warning). The ts-client job never
        # actually invokes npm/yarn/pnpm — it only needs the Node
        # toolchain loaded so that bash + git diff work in the
        # right environment. We omit `node-version:` so the action
        # defaults to the runner's Node (24); `package-manager-cache`
        # is set to false explicitly so v5's auto-cache-by-packageManager
        # heuristic is a no-op even though there's no package.json
        # in edge-control-plane/.
        uses: actions/setup-node@v5
        with:
          package-manager-cache: false

      - name: Generate TypeScript client
        run: bash ./scripts/generate_tsc.sh

      - name: Check for drift
        run: git diff --exit-code internal/generated/api-types.ts

  # ============================================================
  # GO-FMT — gofmt on edge-control-plane
  # ============================================================
  go-fmt:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edge-control-plane
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.0'

      - name: Run gofmt
        run: go fmt ./...

  # ============================================================
  # GOLANGCI-LINT — lint edge-control-plane Go code
  # ============================================================
  golangci-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edge-control-plane
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.0'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          install-mode: goinstall
          working-directory: edge-control-plane

  # ============================================================
  # GO-TEST — go test on edge-control-plane
  # ============================================================
  go-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edge-control-plane
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.0'

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod/
          key: go-mod-${{ runner.os }}-${{ hashFiles('**/go.sum') }}

      - name: Run go test
        run: go test -race -coverprofile=cover.out -covermode=atomic ./...

      - name: Coverage summary
        run: go tool cover -func=cover.out

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v5
        with:
          name: go-cover
          path: cover.out

  # ============================================================
  # GO-TEST-INTEGRATION — migrations roundtrip (postgres)
  # ============================================================
  # Exercises every *.sql file in edge-control-plane/migrations/
  # against a real Postgres via testcontainers. Catches malformed
  # rubenv/sql-migrate markers, CREATE INDEX CONCURRENTLY in a
  # default-wrapped transaction (migrate.go:540-548), and *.up.sql
  # / ↓down.sql asymmetries. Build-tag-gated so the fast `go-test`
  # job stays pure-sqlmock.
  #
  # Uses services: postgres (pre-cached image, ~6s cold start)
  # instead of docker:dind — no privileged container, no dind
  # daemon-shared-state flake.
  go-test-integration:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edge-control-plane
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: edgecloud_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d edgecloud_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_HOST: localhost
      DATABASE_PORT: "5432"
      DATABASE_USER: test
      DATABASE_PASSWORD: test
      DATABASE_NAME: edgecloud_test
      DATABASE_SSLMODE: disable
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.0'

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod/
          key: go-mod-${{ runner.os }}-${{ hashFiles('**/go.sum') }}

      - name: Run migration roundtrip test
        run: go test -tags=integration -v -count=1 ./migrations/... 2>&1 | tee test-logs.txt

      - name: Run worker-cp e2e tests
        # Closes #612: drive the real app.New().Handler via httptest
        # against a fresh Postgres container per test, exercising the
        # bootstrap handshake, the worker-JWT download lane, the
        # X-Internal-Token download lane, and the auth-mode matrix
        # (cross-tenant, anonymous, tampered-artifact).  -run
        # TestWorkerCP scopes the run so unrelated internal/handler
        # regressions don't get dragged in.
        run: go test -tags=integration -v -count=1 ./internal/handler/... -run TestWorkerCP 2>&1 | tee -a test-logs.txt

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: go-integration-logs
          path: edge-control-plane/test-logs.txt

  # ============================================================
  # WIT-DRIFT-CHECK — keep the vendored WIT tree in sync
  # ============================================================
  # The CP's Rust migration path (issue #415) embeds the canonical
  # WIT tree at edge-control-plane/internal/service/wit/ so the
  # binary is self-contained at runtime. The canonical source
  # remains at the top-level wit/ directory (promoted in PR #414).
  # This job fails if the two diverge so the vendored copy can't
  # silently rot.
  wit-drift-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Diff canonical vs vendored WIT
        run: |
          # Exclude embed.go — it's the Go embed shim, not part of
          # the canonical WIT tree (which lives at the top-level
          # wit/ directory). Without --exclude, the drift check
          # would always fail because the vendored copy has one
          # extra file.
          if ! diff -r --exclude embed.go wit edge-control-plane/internal/service/wit > wit-drift.txt; then
            echo "::error::wit-drift-check failed: the vendored copy under edge-control-plane/internal/service/wit is out of sync with the canonical source under wit/. Re-sync via 'cp -R wit/. edge-control-plane/internal/service/wit/' and commit the result. Full diff:"
            cat wit-drift.txt
            exit 1
          fi

  # ============================================================
  # TYPOS — spell check source files
  # ============================================================
  typos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check for typos
        uses: crate-ci/typos@v1

  # ============================================================
  # COVERAGE-RUST — cargo-llvm-cov for all crates
  # ============================================================
  coverage-rust:
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: "0"  # sccache cannot cache incremental compiles
    steps:
      - uses: actions/checkout@v5

      - name: Generate Cargo.lock
        run: cargo generate-lockfile || true

      # .cargo/config.toml sets build.rustc-wrapper = "sccache"
      # unconditionally, so every cargo invocation below needs the
      # wrapper on PATH — this job was missing the step every other
      # rust job has, so `cargo llvm-cov` failed with `could not
      # execute process sccache` on every run; the `|| true` on the
      # coverage step below silently swallowed that failure, making
      # the job report a fast, hollow "pass" with no actual coverage.
      - name: Install sccache (rustc wrapper)
        uses: ./.github/actions/install-sccache

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Run coverage
        run: cargo llvm-cov --lcov --output-path lcov-rust.info --workspace || true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v5
        with:
          name: lcov-rust
          path: lcov-rust.info

  # ============================================================
  # CLI-JS-SMOKE — end-to-end build of the JS sample
  # (issue #423 / #424). Skipped on PRs that don't touch the JS
  # pipeline (edge-cli/, edge-js-runtime/, edge-js-runtime-long/,
  # edge-js-sdk/, wit/, this workflow) so the cost (~5-10 min for
  # `cargo install wasm-tools` on a cold cache) is only paid when
  # relevant. Wired via
  # `dorny/paths-filter` so the skip is real, not a comment-only
  # claim.
  # ============================================================
  cli-js-smoke:
    runs-on: ubuntu-latest
    # `.cargo/config.toml` sets `build.rustc-wrapper = "sccache"`.
    # sccache is not installed on a fresh runner, so the `cargo
    # install` / `cargo build` invocations would fail with
    # `could not execute process \`sccache ...\`` (the same
    # failure mode that `cargo-deny-action` works around in
    # `rust-lint`). Set the env override at job scope — env vars
    # beat config files in cargo's precedence. We don't need
    # sccache here because this job only does two `cargo install`
    # invocations + one edge-cli build; `Swatinem/rust-cache` is
    # for the larger `rust-test` / `rust-lint` runs.
    env:
      CARGO_BUILD_RUSTC_WRAPPER: ""
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Path filter: only run the smoke job when the change touches
      # the JS surface. The `filter` step below evaluates the changed
      # file list against these globs and exports `changes == 'true'`
      # when at least one matches. `dorny/paths-filter` defaults to
      # "any match" semantics for OR-style filtering. We list the
      # workflow file itself (`**.yml`) so edits here re-trigger the
      # smoke job — otherwise a future fix to this file would be
      # unverified.
      #
      # Must run AFTER `actions/checkout` — on `push` events the
      # dorny action's internal `git branch --show-current` runs in
      # `${{ github.workspace }}`, which is an empty dir until
      # checkout populates it. On PR events this is masked because
      # the workspace is pre-checked by the Actions runtime, but on
      # `push` (e.g., a main merge) the job fails with rc=128
      # `fatal: not a git repository` (observed on 2026-07-10
      # post-PR-#498).
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            changes:
              - 'edge-cli/**'
              - 'edge-js-runtime/**'
              - 'edge-js-runtime-long/**'
              - 'edge-js-sdk/**'
              - 'wit/**'
              - 'samples/hello-js/**'
              - '.github/workflows/ci.yml'

      # Skip the rest of the job when the diff doesn't touch JS.
      # `if:` on every subsequent step would be more verbose; the
      # early-exit step surfaces a clear "skipped (no JS changes)"
      # message in the run summary and is the pattern used elsewhere
      # in this workflow.
      - name: Skip — no JS-surface changes
        if: steps.changes.outputs.changes != 'true'
        run: |
          echo "cli-js-smoke: skipped (no changes under edge-cli/, edge-js-runtime/, edge-js-runtime-long/, edge-js-sdk/, wit/, samples/hello-js/, or this workflow)"
          exit 0

      - name: Install Rust toolchain (wasm32-wasip1, wasm32-wasip2)
        uses: dtolnay/rust-toolchain@stable
        # Issue #423: `edge build --lang=js` compiles the JS runtime
        # crate (`edge-js-runtime/`) for `wasm32-wasip1` and then
        # wraps it into a component via `wasm-tools component new
        # --adapt` against the vendored adapter. The legacy
        # `wasm32-wasip2` toolchain install is kept because
        # `edge-migrate`'s Rust migration output also targets wasip2
        # (compile path is separate; this smoke job doesn't exercise
        # it but the target is small and the install is cached).
        with:
          targets: wasm32-wasip1, wasm32-wasip2

      - name: Install Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install wasm-tools 1.252.x
        # Pin to ^1.252 to match the version scripts/dev-install.sh
        # and .github/workflows/preview.yml use. wasm-tools is
        # required by the Rust guest pipeline (`edge build --lang=rust`'s
        # wrap step), `edge-migrate`, the worker fixture build, and
        # the Go control plane's `wrapAsComponent` — NOT by the JS
        # pipeline anymore (the wasip2 cargo target emits a complete
        # component, no wrap). `cargo install --locked` pins the
        # dependency graph; the `target-dir` override keeps the
        # install out of the project's target/ tree.
        run: |
          cargo install wasm-tools --locked --version '^1.252' \
            --root "$HOME/.cargo"

      - name: Build + install edge
        # Build from source rather than relying on a published binary
        # so the smoke tests the exact CLI the next dev will get when
        # they pull the branch. The `edge-cli` package declares a
        # `[[bin]] name = "edge"` (see edge-cli/Cargo.toml), so
        # `cargo install` produces `$root/bin/edge`. That dir is NOT
        # on `$PATH` by default in CI; append it to `$GITHUB_PATH`
        # (the same trick `.github/actions/deploy-preview` uses, per
        # CLAUDE.md).
        run: |
          cargo install --path edge-cli --locked --root "$HOME/.cargo"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Build samples/hello-js
        # The full happy-path the user takes: `npm install` resolves
        # `@edgecloud/sdk` from npm via the `^0.2.0` pin in
        # samples/hello-js/package.json, then `edge build --lang=js`
        # bundles src/handler.js and builds edge-js-runtime directly
        # for `wasm32-wasip1`, then `wasm-tools component new
        # --adapt edge-cli/adapters/wasi_snapshot_preview1.reactor.wasm`
        # wraps it into a WASI Preview 2 component the host linker
        # accepts. Issue #423. The end-to-end build is the
        # regression check — the unit tests in
        # edge-cli/src/commands/init.rs only cover the template
        # shape, not the build itself.
        #
        # The SDK isn't on the public npm registry yet, so this job
        # exercises the install path against a local tarball via
        # `npm pack edge-js-sdk/`. That validates the *exact* bytes
        # an end user would receive when the release manager runs
        # `npm publish --access public` from edge-js-sdk/, without
        # requiring CI to own npm credentials. When the package is
        # published, swap the tarball install for a plain `npm
        # install` (the `^0.2.0` pin resolves the same way either
        # way).
        run: |
          # Build the in-tree SDK into a tarball the npm install path
          # can consume. `npm pack` resolves the workspace's
          # `edge-js-sdk/package.json` and writes a
          # `edgecloud-sdk-0.2.0.tgz` file. Tarball shape is exactly
          # what `npm publish` would upload.
          echo "Packing @edgecloud/sdk from edge-js-sdk/…"
          (cd edge-js-sdk && npm pack --silent)
          sdk_tarball="$(ls edge-js-sdk/edgecloud-sdk-*.tgz | head -1)"
          test -n "$sdk_tarball" || { echo "::error::npm pack produced no tarball"; exit 1; }
          echo "  SDK tarball: $sdk_tarball"

          # Install in samples/hello-js/ with the tarball swapped in
          # for the npm registry. The `package.json` `^0.2.0` pin is
          # preserved (this only redirects the resolution source).
          (cd samples/hello-js && npm install --no-save --no-audit --no-fund "$GITHUB_WORKSPACE/$sdk_tarball")
          (cd samples/hello-js && npm ls @edgecloud/sdk)

          (cd samples/hello-js && edge build --lang=js)
          # The CLI's path_for("js") returns target/javy/<name>.wasm
          # (see edge-cli/src/commands/build.rs:89-104). The artifact
          # is the user-visible deliverable; assert it exists.
          test -f samples/hello-js/target/javy/hello-js.wasm
          # And that it's a valid wasm32 component (wasm-tools can
          # extract the WIT to verify).
          wasm-tools component wit samples/hello-js/target/javy/hello-js.wasm | grep -q 'wasi:http/incoming-handler@0.2.1'

  # ============================================================
  # ROLLBACK-E2E — issue #613
  # ============================================================
  # Cross-language end-to-end test proving that a CP-side
  # DeploymentService.RollbackDeployment call round-trips through
  # the outbox + NATS + worker's run_consume_loop to actually swap
  # the running app. Two test binaries (one Go, one Rust) share
  # a single NATS container, coordinated by scripts/rollback-e2e.sh
  # via sentinel files under /tmp/edge-e2e/. Mirrors the cross-
  # language test precedent set by PR #652 (issue #611 wire
  # contract test).
  #
  # This is the ONLY proof in the suite that the rollback path
  # actually wires together end-to-end. Without it, the regressions
  # PR #583's reviewers worried about (TaskMessage shape drift,
  # outbox→NATS wiring breaks, worker consumer drift) would all
  # land silently.
  rollback-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # The Go half's testcontainers-managed Postgres occasionally
    # races the runner's Docker daemon (cold-runner `host port
    # waiting failed`). Mirror the go-test-integration job's
    # service block so the Go half can fall back to the system
    # postgres container (set via DATABASE_* env vars) when the
    # env is present, and only spin up testcontainers for
    # hermetic local runs. NATS still comes from testcontainers
    # — it has no service counterpart, and `tcnats` is more
    # reliable than `tcpg` on cold runners.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: edgecloud_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d edgecloud_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CARGO_INCREMENTAL: "0"  # sccache cannot cache incremental compiles
      RUSTFLAGS: "-C opt-level=0 -C debuginfo=0"
      # Both halves spin up testcontainers-managed Postgres + NATS.
      # The Rust half's `should_skip_integration_tests` predicate
      # self-skip when CI is set unless RUN_INTEGRATION_TESTS=1, so
      # the orchestrator's Rust invocation sees it.
      RUN_INTEGRATION_TESTS: "1"
      DATABASE_HOST: localhost
      DATABASE_PORT: "5432"
      DATABASE_USER: test
      DATABASE_PASSWORD: test
      DATABASE_NAME: edgecloud_test
      DATABASE_SSLMODE: disable
      # The Go half uses SKIP_INTEGRATION_TESTS=1 as its escape
      # hatch; we don't set it here.
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.0'

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod/
          key: go-mod-${{ runner.os }}-${{ hashFiles('**/go.sum') }}

      - name: Generate Cargo.lock
        run: cargo generate-lockfile || true

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          # Rollback e2e builds the same test profile that rust-test
          # already compiled — share one cache so this job pays only
          # the test-binary link cost, not the full workspace rebuild.
          shared-key: "rust-tests"

      # See rust-lint for the why; sccache is needed because
      # .cargo/config.toml wraps rustc with it unconditionally.
      - name: Install sccache (rustc wrapper)
        uses: ./.github/actions/install-sccache

      - name: Install system dependencies
        # clang for `wasm-tools component wit` validation steps in
        # the build cache; not strictly required for the test itself.
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Run cross-language rollback e2e
        # The orchestrator launches both halves (Go first to start
        # NATS, then Rust to consume), coordinates them via sentinel
        # files, and tears down on any failure. See
        # scripts/rollback-e2e.sh for the full flow.
        #
        # RUST_TEST_TIMEOUT=15m covers the cold-cache CI rebuild of
        # the entire workspace test profile (the orchestrator's
        # `timeout` will SIGKILL the cargo process if it exceeds
        # this). Warm-cache runs finish in <1m. RUST_DONE_WAIT=6m
        # bounds the wall-clock from launch to the rust-done
        # sentinel — it sits above the test runtime even with
        # container startup, and below the job's 20m timeout.
        env:
          # GO_TEST_TIMEOUT sits above the Go half's 15-minute ctx
          # so the ctx fires first and `t.Cleanup` runs (NATS
          # terminate via the testcontainer). Otherwise `go test
          # -timeout` kills the process hard and the NATS container
          # is gone before the Rust half finishes its cargo build.
          GO_TEST_TIMEOUT: 15m
          RUST_TEST_TIMEOUT: 15m
          RUST_DONE_WAIT: 6m
        run: bash scripts/rollback-e2e.sh

      - name: Upload Go half logs
        if: always()
        # The driver writes both halves' logs into /tmp/edge-e2e/,
        # then deletes the directory on exit. We capture them via
        # `always()` only when the test failed — on success the dir
        # is already gone and these globs match nothing.
        uses: actions/upload-artifact@v5
        with:
          name: rollback-e2e-go-log
          path: /tmp/edge-e2e/go.log
          if-no-files-found: ignore

      - name: Upload Rust half logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: rollback-e2e-rust-log
          path: /tmp/edge-e2e/rust.log
          if-no-files-found: ignore
