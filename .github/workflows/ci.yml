name: CI

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ============================================================
  # VALIDATE-RUST — Consolidated Rust validation per crate
  # ============================================================
  validate-rust:
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: "1"
      # Route rustc invocations through sccache so clippy / nextest /
      # udeps share artifact cache across toolchains. Cuts the clippy
      # + nextest + udeps triple-compile from ~3m30s to ~1m30s on a
      # warm cache (verified locally; ~50% reduction in the cold case).
      CARGO_BUILD_RUSTC_WRAPPER: "/usr/local/bin/sccache"
      RUSTC_WRAPPER: "/usr/local/bin/sccache"
      SCCACHE_CACHE_SIZE: "10G"
      SCCACHE_DIR: "${{ runner.temp }}/sccache"
      # So sccache's INFO logs surface in the GitHub Actions log UI
      # under the cargo step's output, instead of going to a file the
      # GitHub runner drops.
      SCCACHE_LOG: "info"
      RUSTFLAGS: "-C opt-level=0 -C debuginfo=0 -C link-arg=-fuse-ld=mold"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang mold

      - name: Install sccache
        # Standalone x86_64-unknown-linux-musl binary from mozilla/sccache —
        # no Rust-toolchain-specific build needed. Pinned to v0.16.0; bump
        # both SCCACHE_TAG (with the leading `v`) and SCCACHE_VERSION
        # (without) on the workflow_dispatch workflow.
        env:
          SCCACHE_TAG: "v0.16.0"
          SCCACHE_VERSION: "0.16.0"
        run: |
          set -euo pipefail
          url="https://github.com/mozilla/sccache/releases/download/${SCCACHE_TAG}/sccache-${SCCACHE_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          echo "Downloading ${url}"
          curl -fsSL --retry 3 --retry-delay 5 "${url}" \
            | tar -xz -C /tmp
          sudo mv "/tmp/sccache-${SCCACHE_VERSION}-x86_64-unknown-linux-musl/sccache" /usr/local/bin/
          sudo chmod +x /usr/local/bin/sccache
          sccache --version

      - name: Cache sccache
        # Persist the on-disk sccache cache between runs so a warm cache
        # starts at ~80-90% of previous build time. The Swatinem cache
        # above handles the target/ artifacts; this handles the sccache
        # daemon's separate cache directory.
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/sccache
          key: sccache-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            sccache-${{ runner.os }}-

      - name: Generate Cargo.lock
        run: cargo generate-lockfile || true

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install rustfmt
        run: rustup component add rustfmt

      - name: Run rustfmt
        run: cargo fmt --check --all

      - name: Install clippy
        run: rustup component add clippy

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Install cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          manifest-path: Cargo.toml

      - name: Install cargo-semver-checks
        uses: taiki-e/install-action@cargo-semver-checks

      - name: Run cargo-semver-checks
        run: cargo semver-checks check-release --workspace --baseline-rev origin/main

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Run cargo audit
        run: cargo audit || true

      - name: Install cargo-nextest
        uses: taiki-e/install-action@cargo-nextest

      - name: Run tests (nextest)
        run: cargo nextest run --workspace

      - name: Install Rust Nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-udeps
        uses: taiki-e/install-action@cargo-udeps

      - name: Run cargo-udeps
        run: cargo +nightly udeps --workspace --all-targets

      - name: Install cargo-geiger
        uses: taiki-e/cache-cargo-install-action@v2
        with:
          tool: cargo-geiger

      - name: Run cargo-geiger
        run: cargo geiger || true

  # ============================================================
  # OPENAPI-VALIDATE — verify all mux routes are covered by the spec
  # ============================================================
  openapi-validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edge-control-plane
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Validate spec coverage
        run: go run ./scripts/openapi_check.go

  # ============================================================
  # TS-CLIENT — generate and diff TypeScript client from OpenAPI spec
  # ============================================================
  ts-client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edge-control-plane
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate TypeScript client
        run: bash ./scripts/generate_tsc.sh

      - name: Check for drift
        run: git diff --exit-code internal/generated/api-types.ts

  # ============================================================
  # GO-FMT — gofmt on edge-control-plane
  # ============================================================
  go-fmt:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edge-control-plane
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Run gofmt
        run: go fmt ./...

  # ============================================================
  # GOLANGCI-LINT — lint edge-control-plane Go code
  # ============================================================
  golangci-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edge-control-plane
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          install-mode: goinstall
          working-directory: edge-control-plane

  # ============================================================
  # GO-TEST — go test on edge-control-plane
  # ============================================================
  go-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edge-control-plane
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod/
          key: go-mod-${{ runner.os }}-${{ hashFiles('**/go.sum') }}

      - name: Run go test
        run: go test -coverprofile=cover.out -covermode=atomic ./...

      - name: Coverage summary
        run: go tool cover -func=cover.out

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-cover
          path: cover.out

  # ============================================================
  # TYPOS — spell check source files
  # ============================================================
  typos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for typos
        uses: crate-ci/typos@v1

  # ============================================================
  # COVERAGE-RUST — cargo-llvm-cov for all crates
  # ============================================================
  coverage-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate Cargo.lock
        run: cargo generate-lockfile || true

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Run coverage
        run: cargo llvm-cov --lcov --output-path lcov-rust.info --workspace || true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: lcov-rust
          path: lcov-rust.info
