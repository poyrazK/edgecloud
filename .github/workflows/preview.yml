name: Preview
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      # Build the hello sample (samples/hello/) into a deployable wasm
      # component. The two-step build is required because of a
      # WIT-version mismatch between `wasm32-wasip2` (which embeds
      # wit-component 0.241.x and emits wasi:http/types@0.2.4) and the
      # runtime (wasmtime 45.0.3, which expects @0.2.1). Building the
      # core wasm module with `wasm32-unknown-unknown` + wrapping with
      # `wasm-tools component new` is the only path that matches today.
      # See samples/hello/README.md for the full rationale.
      - name: Build wasm (core module)
        run: |
          cargo build \
            --manifest-path samples/hello/Cargo.toml \
            --target wasm32-unknown-unknown \
            --release

      - name: Install wasm-tools
        run: cargo install wasm-tools --locked

      - name: Wrap core wasm into wasi:http component
        run: |
          wasm-tools component new \
            samples/hello/target/wasm32-unknown-unknown/release/hello.wasm \
            -o samples/hello/target/component.wasm

      # Stage the wrapped component at the path `edge deploy` looks for
      # by default (edge-cli/src/commands/deploy.rs:65:
      # `target/wasm32-wasip2/release/<app>.wasm`). The CLI also
      # accepts `--file` to override, but the default path keeps the
      # command itself simple.
      - name: Stage wrapped component
        run: |
          mkdir -p target/wasm32-wasip2/release
          cp samples/hello/target/component.wasm target/wasm32-wasip2/release/hello.wasm

      # Install edge CLI from the workspace. The previous version of
      # this step ran `curl .../scripts/install-cli.sh | bash`, but
      # that script does not exist on `main` (404'd in CI run
      # 28745210914). Building from the workspace avoids both the
      # 404 and the supply-chain risk of piping a remote shell script.
      - name: Install edge CLI
        run: cargo install --path ./edge-cli --locked --root "$CARGO_HOME"

      # The cargo install above puts the `edge` binary at
      # `$CARGO_HOME/bin/edge`. Each GitHub Actions step is a fresh
      # shell, so PATH from this step doesn't carry to the next.
      # `dtolnay/rust-toolchain` only adds `$CARGO_HOME/bin` to PATH
      # for steps immediately following it; the cargo install in
      # between resets the env. CI run 28774697516 + 28774979460
      # both failed with `edge: command not found (rc=127)` even
      # with `PATH: ${{ env.CARGO_HOME }}/bin:${{ env.PATH }}` set
      # in the step's env — `${{ env.PATH }}` rendered as empty
      # string, so the resulting PATH was just
      # `/home/runner/.cargo/bin:` (trailing colon, no system PATH).
      # Bypass the issue entirely by using the absolute path to
      # `edge`.
      - name: Deploy preview
        id: deploy
        env:
          # cargo install defaults the binary name to the crate
          # name (with `-` replaced by `-`); the edge-cli crate
          # produces `edge-cli`, not `edge`. CI run 28775240288
          # hit "No such file or directory" with EDGE_BIN=.../edge
          # — the file is actually .../edge-cli.
          EDGE_BIN: /home/runner/.cargo/bin/edge-cli
          EDGE_API_KEY: ${{ secrets.EDGECLOUD_API_KEY }}
          EDGE_API_URL: ${{ secrets.EDGECLOUD_API_URL }}
        run: |
          # Skip silently when no API key is configured (typical for
          # fork PRs where secrets aren't shared). The downstream
          # "Comment PR" step gates on `preview-url != ''` so this
          # is a no-op for the PR.
          if [ -z "$EDGE_API_KEY" ]; then
            echo "no EDGE_API_KEY configured — skipping preview deploy"
            echo "preview-url=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # `set -o pipefail` ensures a failing `edge deploy --preview`
          # makes the step fail instead of masking the failure via a
          # `tee` pipeline.
          set -o pipefail

          # Capture merged stdout+stderr to a buffer so the URL
          # parse below can run against the full output regardless
          # of where the CLI wrote it.
          output=$(EDGE_API_KEY="$EDGE_API_KEY" EDGE_API_URL="$EDGE_API_URL" "$EDGE_BIN" deploy --preview 2>&1) || {
            rc=$?
            echo "::error::edge deploy --preview failed (rc=$rc)"
            printf '%s\n' "$output"
            echo "preview-url=" >> "$GITHUB_OUTPUT"
            exit "$rc"
          }

          # The CLI emits the deployed URL on a line of its own as
          # "  URL: <url>" (see edge-cli/src/commands/deploy.rs:100).
          # Anchoring on the "  URL: " prefix avoids grabbing any
          # other https:// substring that the CLI or the API may
          # have printed — e.g. doc URLs in API 5xx bodies or
          # GitHub PR diff links in error templates. A naked
          # "https?://..." grep would pick the first doc/help URL
          # on failure.
          url=$(printf '%s\n' "$output" | grep -E '^[[:space:]]*URL:[[:space:]]+https?://' | head -1 | grep -oP 'https?://\S+')
          # Fallback for the `--preview` deploy path, where the CLI
          # uses a suffixed `<tenant>-<app>--preview-<hash>.edgecloud.dev`
          # URL.
          [ -z "$url" ] && url=$(printf '%s\n' "$output" | grep -oP 'https://[A-Za-z0-9.-]*--preview-[A-Za-z0-9]+\.edgecloud\.dev' | head -1)
          [ -z "$url" ] && url=$(printf '%s\n' "$output" | grep -oP 'https://[A-Za-z0-9.-]+\.edgecloud\.dev' | head -1)

          echo "preview-url=$url" >> "$GITHUB_OUTPUT"
          if [ -n "$url" ]; then
            echo "preview-url=$url"
          fi

      - name: Comment PR
        if: steps.deploy.outputs.preview-url != ''
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Preview deployed at: ${{ steps.deploy.outputs.preview-url }}`
            })