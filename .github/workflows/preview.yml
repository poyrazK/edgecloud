name: Preview
on:
  pull_request:
    types: [opened, synchronize]

# DISABLED 2026-07-06 — the `Install edge CLI` step in
# .github/actions/deploy-preview/action.yml installs `cargo install
# --path ./edge-cli --locked --root "$CARGO_HOME"`, putting the binary at
# `$CARGO_HOME/bin/edge`, but the next step's `shell: bash` subshell
# doesn't have `$CARGO_HOME/bin` on `$PATH`. Every PR fails with
# `edge: command not found` (rc=127) until the action also runs:
#
#   - name: Expose edge CLI on PATH
#     run: echo "$CARGO_HOME/bin" >> "$GITHUB_PATH"
#
# The `if: false` below hard-skips the job so PRs aren't blocked; a
# follow-up commit will re-enable once PATH propagation lands.
jobs:
  deploy-preview:
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      # Build the edge CLI into $CARGO_HOME/bin (so the binary is on
      # PATH for subsequent steps — the composite action's install
      # step does this too, but we need edge *before* the Build step).
      # Building from the workspace is safer than piping a remote
      # install script — no supply-chain risk on every CI run, and
      # the workspace's resolver pins it to the same version as the
      # rest of edgeCloud.
      - name: Install edge CLI
        run: cargo install --path ./edge-cli --locked --root "$CARGO_HOME"

      # Build the hello sample (samples/hello/) into a deployable
      # wasm component via the CLI. `edge build` runs the proven
      # two-step recipe (cargo under wasm32-unknown-unknown +
      # `wasm-tools component new`) internally, so the workflow no
      # longer needs to install wasm-tools or stage files manually.
      # See samples/hello/README.md for the wasi:http@0.2.1 vs 0.2.4
      # rationale.
      - name: Build hello sample
        working-directory: samples/hello
        run: edge build

      # Delegate install-cli + edge deploy + URL capture to the
      # reusable composite action. We pass `build: 'false'` because
      # the wasm build is handled above (the composite's default
      # `edge build` from cwd would run against the workspace root
      # which has no `[project]` section, so it would fail to find
      # an edge.toml).
      #
      # Fork PRs do not receive `secrets.EDGECLOUD_API_KEY` — the
      # composite treats an empty API key as a no-op (writes empty
      # `preview-url`), and the `Comment PR` step's `if:` skips on
      # empty string. No secrets leak, no spurious failure.
      - uses: ./.github/actions/deploy-preview
        id: deploy
        with:
          api-key: ${{ secrets.EDGECLOUD_API_KEY }}
          api-url: ${{ secrets.EDGECLOUD_API_URL }}
          build: 'false'

      - name: Comment PR
        if: steps.deploy.outputs.preview-url != ''
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Preview deployed at: ${{ steps.deploy.outputs.preview-url }}`
            })