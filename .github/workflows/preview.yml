name: Preview
on:
  pull_request:
    types: [opened, synchronize]

# Preview workflow (issue #308).
#
# Fires on every PR open/synchronize. Builds the samples/hello wasm,
# then delegates to .github/actions/deploy-preview which installs
# the CLI and runs `edge-cli deploy --preview --pr-number=<N>`. The
# resulting URL is commented back on the PR (when EDGECLOUD_API_KEY
# is configured — fork PRs lack it and silently no-op).
jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      # Build the edge CLI into $CARGO_HOME/bin. The follow-up step
      # appends $CARGO_HOME/bin to $GITHUB_PATH so the next bash
      # subshell can find `edge` (issue #308 — pre-fix, every PR
      # failed with `edge: command not found` (rc=127)). Building
      # from the workspace is safer than piping a remote install
      # script: no supply-chain risk on every CI run, and the
      # workspace's resolver pins it to the same version as the rest
      # of edgeCloud.
      - name: Install edge CLI
        run: cargo install --path ./edge-cli --locked --root "$CARGO_HOME"

      # Build the hello sample (samples/hello/) into a deployable
      # wasm component via the CLI. The CLI binary is named `edge-cli`
      # (per edge-cli/Cargo.toml's [package].name — not `edge`). `edge-cli`
      # runs the proven two-step recipe (cargo under
      # wasm32-unknown-unknown + `wasm-tools component new`)
      # internally, so the workflow no longer needs to install
      # wasm-tools or stage files manually.
      # See samples/hello/README.md for the wasi:http@0.2.1 vs 0.2.4
      # rationale.
      - name: Build hello sample
        working-directory: samples/hello
        run: edge-cli build

      # Delegate install-cli + edge-cli deploy + URL capture to the
      # reusable composite action. We pass `build: 'false'` because
      # the wasm build is handled above (the composite's default
      # `edge-cli build` from cwd would run against the workspace root
      # which has no `[project]` section, so it would fail to find
      # an edge.toml).
      #
      # `pr-number` is the GitHub PR number the composite action
      # forwards to `edge-cli deploy --pr-number=<N>`. The control
      # plane stamps it into the guest env as
      # `EDGE_PREVIEW_PR_NUMBER` so samples/hello can render
      # PR-aware UI. Empty string when the trigger isn't a PR (the
      # composite's parser is lenient — empty means "no PR
      # context").
      #
      # Fork PRs do not receive `secrets.EDGECLOUD_API_KEY` — the
      # composite treats an empty API key as a no-op (writes empty
      # `preview-url`), and the `Comment PR` step's `if:` skips on
      # empty string. No secrets leak, no spurious failure.
      - uses: ./.github/actions/deploy-preview
        id: deploy
        with:
          api-key: ${{ secrets.EDGECLOUD_API_KEY }}
          api-url: ${{ secrets.EDGECLOUD_API_URL }}
          pr-number: ${{ github.event.pull_request.number }}
          build: 'false'

      - name: Comment PR
        if: steps.deploy.outputs.preview-url != ''
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Preview deployed at: ${{ steps.deploy.outputs.preview-url }}`
            })