[package]
name = "edge-ingress-sidecar"
version = "0.1.0"
edition = "2021"
rust-version = "1.85"
publish = false

# `cargo-udeps` flags every dep as "unused" until PR B wires them — the
# skeleton placeholder modules only carry `#![allow(dead_code)]` stubs.
# Schema is nested (see CLAUDE.md "Cargo udeps ignore-list schema"):
# `normal` covers `[dependencies]`, `development` covers `[dev-dependencies]`.
# Update this list as PRs B/C/D/E land — the goal is to delete entries
# once each dep has a real call site.
[package.metadata.cargo-udeps.ignore]
normal = ["async-nats", "futures", "humantime", "serde_json", "thiserror"]
development = ["edge-test-helpers", "testcontainers", "testcontainers-modules"]

[[bin]]
name = "edge-ingress-sidecar"
path = "src/main.rs"

[dependencies]
# Mirrors `edge-ingress/Cargo.toml`. The sidecar exists so `edge-ingress`
# itself never has to host the JetStream sum-side of cross-replica rate
# limiting. Issue #665.
tokio = { version = "1.45", features = ["full"] }
async-nats = { version = "0.49", features = ["jetstream"] }
futures = "0.3"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
thiserror = "2.0"
humantime = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
clap = { version = "4.5", features = ["derive"] }
tokio-util = { version = "0.7", features = ["rt"] }
metrics = "0.24"
metrics-exporter-prometheus = { version = "0.16", features = ["http-listener"] }

[dev-dependencies]
# Reuses the same NATS-testcontainer helper already wired into edge-ingress
# (see `edge-test-helpers`). PR B will plug the testcontainer-backed NATS
# into the publisher + consumer unit tests.
testcontainers = { version = "0.27", features = ["blocking"] }
testcontainers-modules = { version = "0.15", features = ["nats"] }
edge-test-helpers = { path = "../edge-test-helpers" }
