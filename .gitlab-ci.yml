image: rust:1.85

stages:
  - check
  - test
  - build

variables:
  CARGO_TERM_COLOR: always

rustfmt:
  stage: check
  before_script:
    - rustup component add rustfmt
  script:
    - cargo fmt --check --manifest-path edge-runtime/Cargo.toml
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  cache:
    key: cargo-lock-$CI_COMMIT_REF_SLUG
    paths:
      - ~/.cargo/bin/
      - target/

clippy:
  stage: check
  before_script:
    - rustup component add clippy
  script:
    - cargo clippy --all-targets --all-features --manifest-path edge-runtime/Cargo.toml -- -D warnings
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  cache:
    key: cargo-lock-$CI_COMMIT_REF_SLUG
    paths:
      - ~/.cargo/bin/
      - target/

audit:
  stage: check
  before_script:
    - rustup component add rust-src
    - cargo install cargo-audit
  script:
    - cargo audit --manifest-path edge-runtime/Cargo.toml
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  cache:
    key: cargo-lock-$CI_COMMIT_REF_SLUG
    paths:
      - ~/.cargo/bin/
      - target/

test:
  stage: test
  script:
    - cargo test --manifest-path edge-runtime/Cargo.toml
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  cache:
    key: cargo-lock-$CI_COMMIT_REF_SLUG
    paths:
      - ~/.cargo/bin/
      - target/

build:
  stage: build
  script:
    - cargo build --manifest-path edge-runtime/Cargo.toml
    - cargo build --manifest-path edge-runtime/Cargo.toml --release
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  cache:
    key: cargo-lock-$CI_COMMIT_REF_SLUG
    paths:
      - ~/.cargo/bin/
      - target/
