  # Webhook delivery history (issue #659). Cursor pagination only —
  # `?offset` is intentionally not exposed because the server never
  # advertises it; clients should follow `next_cursor` instead. The
  # response envelope is `{deliveries, limit, next_cursor}` so the
  # OpenAPI schema can document named properties.
  /api/v1/webhooks/{webhookID}/deliveries:
    get:
      operationId: listWebhookDeliveries
      summary: List delivery attempts for a webhook (cursor pagination)
      description: |
        Returns the most recent delivery attempts for the given webhook,
        newest first. The endpoint is tenant-scoped — a webhook owned by
        another tenant (or unknown) returns 404, never leaking the existence
        of webhook IDs across tenants.

        Pages are bounded by `limit` (default 50, max 200). To page
        forward, pass the previous response's `next_cursor` value as the
        `cursor` query parameter verbatim. When `next_cursor` is `null`,
        the current page is the final page.
      parameters:
        - name: webhookID
          in: path
          required: true
          schema:
            type: string
          description: Webhook id (the `wh_…` prefix from `listWebhooks`).
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          description: Maximum deliveries per page. Server-side clamped to 200.
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: |
            Opaque next-page cursor from a prior response's `next_cursor`.
            Treat as a black box; the server may change the internal shape
            between versions.
      responses:
        '200':
          description: Deliveries page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookDeliveriesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

