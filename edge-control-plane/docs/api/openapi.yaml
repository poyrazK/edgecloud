        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 50
          description: Maximum rows to return. Clamped to [1, 500].
      responses:
        '200':
          description: Event list, newest first.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutoscaleEventList'
        '401':
