        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/billing/portal:
    post:
      operationId: openBillingPortal
      summary: Open the provider-hosted self-service portal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BillingPortalRequest'
      responses:
        '200':
          description: Portal session created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingPortalResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Tenant has no subscription yet — start a checkout first.
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/billing/subscription:
    get:
      operationId: getBillingSubscription
      summary: Get the authenticated tenant's current subscription
      responses:
        '200':
          description: Current subscription state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingSubscription'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Tenant has no subscription.
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/billing/webhook:
    post:
      operationId: receiveBillingWebhook
      summary: Provider webhook ingress (signature-verified inline)
      description: |
        Inbound webhook from the configured billing provider
        (e.g. Stripe). The provider verifies the signature inline
        using its webhook secret; no Bearer token is required.
        Returns 200 on success or idempotent replay, 400 on
        signature failure (provider retries), 422 on
        tenant-unresolved events, 500 on a DB error.
      security: []
      responses:
        '200':
          description: Event accepted, already processed, or intentionally ignored.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingWebhookAck'
              examples:
                ok:
                  value:
                    status: ok
                ignored:
                  value:
                    status: ignored
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          description: The event was signature-valid but could not be attributed to a tenant.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: BILLING_TENANT_UNRESOLVED
                  message: tenant unresolved for event
        '500':
          $ref: '#/components/responses/InternalError'

  # -------------------------------------------------------------------------
