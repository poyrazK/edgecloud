  # -------------------------------------------------------------------------
  # Egress allowlist
  # -------------------------------------------------------------------------
  /api/v1/egress:
    get:
      operationId: getEgressAllowlist
      summary: Get the authenticated tenant's outbound egress allowlist
      responses:
        '200':
          description: Current egress allowlist. Empty array means allow-all (no restriction).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EgressAllowlist'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      operationId: updateEgressAllowlist
      summary: Replace the authenticated tenant's outbound egress allowlist
      description: >
        Replaces the tenant's allowlist and immediately republishes TaskMessages
        to all running workers so they enforce the new policy without a manual
        re-activate. An empty array clears the list (allow-all). A non-empty
        array restricts outbound HTTP to only the listed hostnames or wildcard
        patterns (e.g. `api.stripe.com`, `*.sendgrid.net`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EgressAllowlist'
      responses:
        '200':
          description: Updated allowlist (normalized to lowercase).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EgressAllowlist'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/metrics:
    get:
      operationId: getTenantMetrics
      summary: Prometheus metrics for the authenticated tenant
      description: |
        Returns Prometheus text-format (0.0.4) metrics for the calling tenant only.
        Includes request counts, outbound bytes, and any guest-emitted counters,
        gauges, and histogram samples from `edge:observe`.
      responses:
        '200':
          description: Prometheus text-format metrics for this tenant
          content:
            text/plain:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Unauthorized'

