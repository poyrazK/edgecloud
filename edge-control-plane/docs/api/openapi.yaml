            type: string
      responses:
        '204':
          description: Tenant deleted.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/admin/tenants/{tenantID}/quota-override:
    post:
      operationId: adminQuotaOverride
      summary: Manually override a tenant's quota or lock state (admin only)
      description: |
        Owner-role escape hatch for the billing umbrella. Every field is
        optional; absent fields are untouched. The most common uses are
        to clear a free-tier lockdown (`clear_disabled_at: true`), grant a
        temporary grace window (`set_overage_allowed_until`), or pin a
        per-deployment cap for a paying customer that's about to
        cross the line. Every override is recorded in `audit_logs` with
        action `quota.override`.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: tenantID
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuotaOverrideRequest'
      responses:
        '200':
          description: Quota / lock state updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Quota'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/admin/tenants/{tenantID}/rate-limit:
    put:
      operationId: adminSetTenantRateLimit
      summary: Set or clear a tenant's data-plane rate-limit caps (admin only)
      description: |
        Writes the four per-tenant rate-limit columns on `quotas`
        (`tenant_rate_limit_rps`, `tenant_rate_limit_burst`,
        `tenant_concurrent_limit`, `tenant_bandwidth_bps`) via
        `UPDATE ... SET ... WHERE tenant_id = $1`. Every field in the
        request body is optional; absent fields are not modified. The
        `tenant_rate_limit_set_at` audit column is bumped to
        `now()` on every write.

        The ingress picks up the change on its next
        `TENANT_RATE_LIMIT_FETCH_INTERVAL` tick (default 30s):
        a non-zero rps causes a new per-tenant `rate_limit` route to
        appear in Caddy; clearing rps back to 0 (or deleting the whole
        row via all-zero + 404) removes the route on the next tick.

        Records an `audit_logs` row with action `tenant.rate_limit.set`
        and the full request body as the diff payload.

        Owner role required. Returns 404 when the tenant (or its quota
        row) doesn't exist; 400 when any field is negative.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: tenantID
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantRateLimitRequest'
      responses:
        '200':
          description: Rate-limit row upserted. Returns the post-write values.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantRateLimitResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/admin/tenants/{tenantID}/enable:
    post:
      operationId: enableTenant
      summary: Re-enable a tenant disabled by quota-exceeded (admin only)
      description: |
        Clears tenants.disabled_at for a tenant that the quota-exceeded
        path stamped via SetDisabledAt (issue #440). Subsequent
        activate / rollback / deploy requests proceed without
        returning 409 tenant_disabled.

        Idempotent: calling on an already-enabled tenant is a 200
        with no state change.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: tenantID
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Tenant re-enabled. The disabled_at column has been cleared.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

