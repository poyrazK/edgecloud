  # -------------------------------------------------------------------------
  # Custom domains (issue #83)
  # -------------------------------------------------------------------------
  /api/v1/apps/{appName}/domains:
    post:
      operationId: addDomain
      summary: Bind a custom FQDN to an existing app
      description: |
        Validates the FQDN shape (RFC 1035, lowercase, ≤253 chars, no
        wildcards, no `.edgecloud.dev` suffix), enforces a per-app quota
        (50 by default), and inserts a row in `pending` state. The ingress
        picks up the new row on its next 30 s poll and Caddy begins ACME
        issuance on the first request to that host.
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/appName'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddDomainRequest'
      responses:
        '201':
          description: Domain row created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Domain'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: App not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/QuotaExceeded'
        '500':
          $ref: '#/components/responses/InternalError'

    get:
      operationId: listDomains
      summary: List all custom FQDNs bound to an app
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/appName'
      responses:
        '200':
          description: List of domain rows.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/apps/{appName}/domains/{fqdn}:
    get:
      operationId: getDomain
      summary: Fetch one domain row by FQDN
      description: |
        Returns the row including its `status`, `last_error` (if the v2
        Caddy webhook has populated it), and `verified_at`. Use this to
        diagnose a `failed` row.
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/appName'
        - name: fqdn
          in: path
          required: true
          schema:
            type: string
          description: The FQDN to look up.
      responses:
        '200':
          description: Domain row.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Domain'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: No row matches (app, fqdn).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      operationId: removeDomain
      summary: Unbind a custom FQDN from an app
      description: |
        Deletes the row. The ingress drops the FQDN route on its next
        30 s poll and Caddy's cert for that host is not renewed on expiry.
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/appName'
        - name: fqdn
          in: path
          required: true
          schema:
            type: string
          description: The FQDN to remove.
      responses:
        '204':
          description: Domain row removed.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: No row matches (app, fqdn).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  # -------------------------------------------------------------------------
  # Internal: Worker-facing
  # -------------------------------------------------------------------------
  /api/internal/download/{deploymentID}:
    get:
      operationId: downloadArtifact
      summary: Download the Wasm artifact for a deployment
      description: |
        Used by workers to download artifact content after a task update,
        AND by peer control planes to pull artifacts through this CP for
        a remote region's worker. Auth is dual-lane:

          - **Worker JWT** (existing): a valid 24h HMAC JWT in
            `Authorization: Bearer <token>`. Used by every edge-worker
            today.
          - **Internal token** (new, issue #127 step 3): the
            `X-Internal-Token: <value>` header matching the receiving
            CP's `internal_token` config. Used by a peer CP whose local
            cache is cold when a worker in its region calls. The peer
            CP must use `https://` to protect the token in transit.

        A request presenting `Authorization` is dispatched to the worker
        lane (and rejected if the JWT is invalid); a request without
        `Authorization` is dispatched to the internal-token lane. The
        internal-token lane is fail-closed when `internal_token` is
        unset, so a misconfigured CP cannot accidentally widen access.
      security:
        - WorkerJWTAuth: []
        - InternalTokenAuth: []
      parameters:
        - name: deploymentID
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Wasm artifact binary.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/internal/workers:
    post:
      operationId: registerWorker
      summary: Register a worker with the control plane
      description: |
        Called by a worker on startup. The worker's JWT contains its identity
        (worker_id, tenant_id, apps). This call persists worker metadata and
        subscribes the control plane to the worker's heartbeat stream.
      security:
        - WorkerJWTAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterWorkerRequest'
      responses:
        '201':
          description: Worker registered.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/QuotaExceeded'
        '500':
          $ref: '#/components/responses/InternalError'

    get:
      operationId: listWorkers
      summary: List all registered workers for the tenant
      security:
        - WorkerJWTAuth: []
      responses:
        '200':
          description: List of workers.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkerListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

parameters:
  appName:
    name: appName
    in: path
    required: true
    schema:
      type: string
    description: Unique name of the app within the tenant.
