  # -------------------------------------------------------------------------
  # Migration
  # -------------------------------------------------------------------------
  /api/v1/migrate:
    post:
      operationId: migrate
      summary: Submit C source code for auto-transformation and WASI compilation
      description: |
        Accepts a C source file, applies tree-sitter analysis to detect
        POSIX/WASI migration patterns, auto-transforms safe patterns, and
        compiles the result to a WebAssembly component via wasi-sdk.
        The resulting artifact is stored and a deployment record is created.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, filename, language]
              properties:
                file:
                  type: string
                  format: binary
                  description: The C source file to migrate.
                filename:
                  type: string
                  description: Original filename (used to derive the app name).
                  example: hello_world.c
                language:
                  type: string
                  enum: [c]
                  description: Currently only "c" is supported.
      responses:
        '200':
          description: Migration report.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MigrationReport'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/migrate-tree:
    post:
      operationId: migrateTree
      summary: Submit a multi-file source tree for auto-transformation and WASI compilation
      description: |
        Accepts either a zip archive or multipart parts + JSON manifest
        containing C or Rust source files. Each file is analyzed for
        POSIX/WASI migration patterns, auto-transformed where safe, and
        compiled to a WebAssembly component. The resulting artifact is
        stored and a deployment record is created.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [tree, app_name, language]
              properties:
                app_name:
                  type: string
                  pattern: '^[a-z0-9][a-z0-9-]{0,62}$'
                  description: Unique app name (alphanumeric, hyphens, 1-63 chars).
                  example: my-app
                language:
                  type: string
                  enum: [c, rust]
                  description: Source language.
                tree:
                  type: string
                  format: binary
                  description: |
                    Either a zip archive (Content-Type application/zip) or a
                    JSON manifest `{"files":["path1","path2",...]}` referencing
                    individual `file` parts. Zip is the recommended format.
                file:
                  type: string
                  format: binary
                  description: |
                    One `file` part per entry in the tree manifest. Required
                    when `tree` is a JSON manifest. Ignored when `tree` is zip.
      responses:
        '200':
          description: Tree migration report.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TreeMigrationReport'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '413':
          description: Request body too large.
        '422':
          description: Migration failed (source errors or compile failure).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TreeMigrationReport'
        '500':
          $ref: '#/components/responses/InternalError'

