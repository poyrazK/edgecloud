  # -------------------------------------------------------------------------
  # Secrets key management (internal auth)
  # -------------------------------------------------------------------------
  /api/v1/admin/secrets/keys:
    get:
      operationId: listSecretsKeys
      summary: List key IDs in the secrets keyring
      security:
        - InternalTokenAuth: []
      responses:
        '200':
          description: Key IDs
          content:
            application/json:
              schema:
                type: object
                properties:
                  key_ids:
                    type: array
                    items:
                      type: string
                  active_key:
                    type: string
                  encryption_enabled:
                    type: boolean
                  # Issue #441: count of app_env rows that don't match
                  # the encrypted shape (kid:nonce:ct with a known kid).
                  # Drives the operator migration to /admin/secrets/re-encrypt.
                  # 0 = clean. N > 0 = N plaintext rows still need migration.
                  # -1 = the count query itself errored; the CP logs the
                  # underlying error and returns the keyring info anyway
                  # (see handler.ListKeys). The 401 response shape is
                  # unchanged.
                  plaintext_row_count:
                    type: integer
                    example: 0
        '401':
          description: Missing or invalid internal token

  /api/v1/admin/secrets/re-encrypt:
    post:
      operationId: reEncryptSecrets
      summary: Re-encrypt all env values with the active key
      security:
        - InternalTokenAuth: []
      responses:
        '200':
          description: Re-encryption complete
          content:
            application/json:
              schema:
                type: object
                properties:
                  re_encrypted:
                    type: integer
                  # Issue #441: plaintext rows are already plaintext —
                  # re-encrypting is a no-op — so they're counted here
                  # and skipped. A non-zero value after a migration
                  # run indicates the operator still has legacy rows.
                  plaintext_skipped:
                    type: integer
                    example: 0
                  status:
                    type: string
        '400':
          description: Encryption not configured
        '500':
          description: Re-encryption failed

  /api/v1/internal/traffic/{tenantID}/{appName}:
    get:
      summary: Internal traffic split lookup
      parameters:
        - in: path
          name: tenantID
          required: true
          schema:
            type: string
        - in: path
          name: appName
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Traffic split data

  /api/v1/internal/rate-limits/{tenantID}/{appName}:
    get:
      summary: Per-app rate limit override for the ingress
      description: |
        Returns per-app rate limit overrides consumed by the edge-ingress
        ratelimit fetcher. Both fields default to 0 (no override).
      parameters:
        - in: path
          name: tenantID
          required: true
          schema:
            type: string
        - in: path
          name: appName
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Rate limit override
          content:
            application/json:
              schema:
                type: object
                properties:
                  rps:
                    type: integer
                    description: Requests per second (0 = no override)
                  burst:
                    type: integer
                    description: Burst size (0 = no override)
        '400':
          description: Invalid app name or tenant ID
        '404':
          description: App not found

  # -------------------------------------------------------------------------
  # Internal: per-tenant data-plane rate limit (issue #305)
  # -------------------------------------------------------------------------
  /api/v1/internal/rate-limit/{tenantID}:
    get:
      summary: Per-tenant data-plane rate-limit caps for the ingress
      description: |
        Returns the four per-tenant caps consumed by the
        edge-ingress `tenant_ratelimit` fetcher. Polled every
        `TENANT_RATE_LIMIT_FETCH_INTERVAL` (default 30s) per tenant
        in the routing table. Drives the per-tenant `rate_limit`
        routes in Caddy (sub-feature #1).

        Returns 404 when the tenant has no `quotas` row (fail-open:
        the cache clears the entry so the renderer stops emitting a
        route for that tenant). Returns 200 with all-zero caps when
        the row exists but no caps are configured (same fail-open
        semantics — the cache drops the entry). 5xx is logged at
        warn but not treated as a cache invalidation, so the
        ingress keeps the last-known state.
      security:
        - InternalTokenAuth: []
      parameters:
        - in: path
          name: tenantID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Per-tenant rate-limit caps (all zeros = no caps).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantRateLimitResponse'
        '400':
          description: Invalid tenant ID
        '404':
          description: Tenant has no quotas row

  # -------------------------------------------------------------------------
  # Internal: per-tenant quota state (issue #420)
  # -------------------------------------------------------------------------
  /api/v1/internal/quota/{tenantID}:
    get:
      summary: Per-tenant quota state for the ingress
      description: |
        Returns the per-tenant quota row plus the derived `over_cap`
        boolean consumed by the edge-ingress quota fetcher. The fetcher
        polls this endpoint every `QUOTA_FETCH_INTERVAL` seconds
        (default 30s) and keys its Caddy `static_response` 402 block
        off `over_cap`. The `locked_until` field is the
        `quotas.quota_lock_grace_until` value — the request-time 402
        activates after this timestamp passes.
      security:
        - InternalTokenAuth: []
      parameters:
        - in: path
          name: tenantID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Quota state for the tenant.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Quota'
        '400':
          description: Invalid tenant ID
        '404':
          description: Tenant not found

  # Issue #548: edge-ingress polls this every QUOTA_FETCH_INTERVAL so
  # two ingress instances in the same region converge on the same
  # persisted L4 port for each (tenant, app). Mounted under the same
  # X-Internal-Token as the other /api/v1/internal/* endpoints.
  /api/v1/internal/l4-port/{tenantID}/{appName}:
    get:
      summary: Per-(tenant, app) L4/TCP public port for the ingress
      description: |
        Returns the persisted L4 public port for the named (tenant, app).
        The ingress `L4PortCache` polls this endpoint every
        `QUOTA_FETCH_INTERVAL` (default 30s) so two ingress instances in
        the same region can converge on the same persisted port. 404
        means either "app not found" or "no port allocated yet" — the
        ingress treats both as a cache miss and falls back to its local
        `L4PortPool` + write-back on the next heartbeat.
      security:
        - InternalTokenAuth: []
      parameters:
        - in: path
          name: tenantID
          required: true
          schema:
            type: string
        - in: path
          name: appName
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Port assigned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/L4PortResponse'
        '400':
          description: Invalid app name or tenant ID
        '404':
          description: |
            App not found, or app exists but no port allocated yet.

  # -------------------------------------------------------------------------
  # Custom domains (issue #83)
  # -------------------------------------------------------------------------
  /api/v1/apps/{appName}/domains:
    post:
      operationId: addDomain
      summary: Bind a custom FQDN to an existing app
      description: |
        Validates the FQDN shape (RFC 1035, lowercase, ≤253 chars, no
        wildcards, no `.edgecloud.dev` suffix), enforces a per-app quota
        (50 by default), and inserts a row in `pending` state. The ingress
        picks up the new row on its next 30 s poll and Caddy begins ACME
        issuance on the first request to that host.
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/appName'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddDomainRequest'
      responses:
        '201':
          description: Domain row created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Domain'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: App not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/QuotaExceeded'
        '500':
          $ref: '#/components/responses/InternalError'

    get:
      operationId: listDomains
      summary: List all custom FQDNs bound to an app
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/appName'
      responses:
        '200':
          description: List of domain rows.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/apps/{appName}/domains/{fqdn}:
    get:
      operationId: getDomain
      summary: Fetch one domain row by FQDN
      description: |
        Returns the row including its `status`, `last_error` (if the v2
        Caddy webhook has populated it), and `verified_at`. Use this to
        diagnose a `failed` row.
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/appName'
        - name: fqdn
          in: path
          required: true
          schema:
            type: string
          description: The FQDN to look up.
      responses:
        '200':
          description: Domain row.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Domain'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: No row matches (app, fqdn).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      operationId: removeDomain
      summary: Unbind a custom FQDN from an app
      description: |
        Deletes the row. The ingress drops the FQDN route on its next
        30 s poll and Caddy's cert for that host is not renewed on expiry.
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/appName'
        - name: fqdn
          in: path
          required: true
          schema:
            type: string
          description: The FQDN to remove.
      responses:
        '204':
          description: Domain row removed.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: No row matches (app, fqdn).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  # -------------------------------------------------------------------------
  # Internal: Worker-facing
  # -------------------------------------------------------------------------
  /api/internal/download/{deploymentID}:
    get:
      operationId: downloadArtifact
      summary: Download the Wasm artifact for a deployment
      description: |
        Used by workers to download artifact content after a task update,
        AND by peer control planes to pull artifacts through this CP for
        a remote region's worker. Auth is dual-lane:

          - **Worker JWT** (existing): a valid 24h HMAC JWT in
            `Authorization: Bearer <token>`. Used by every edge-worker
            today.
          - **Internal token** (new, issue #127 step 3): the
            `X-Internal-Token: <value>` header matching the receiving
            CP's `internal_token` config. Used by a peer CP whose local
            cache is cold when a worker in its region calls. The peer
            CP must use `https://` to protect the token in transit.

        A request presenting `Authorization` is dispatched to the worker
        lane (and rejected if the JWT is invalid); a request without
        `Authorization` is dispatched to the internal-token lane. The
        internal-token lane is fail-closed when `internal_token` is
        unset, so a misconfigured CP cannot accidentally widen access.
      security:
        - WorkerJWTAuth: []
        - InternalTokenAuth: []
      parameters:
        - name: deploymentID
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Wasm artifact binary.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/internal/workers:
    post:
      operationId: registerWorker
      summary: Register a worker with the control plane
      description: |
        Called by a worker on startup. The worker's JWT contains its identity
        (worker_id, tenant_id, apps). This call persists worker metadata and
        subscribes the control plane to the worker's heartbeat stream.
      security:
        - WorkerJWTAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterWorkerRequest'
      responses:
        '201':
          description: Worker registered.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/QuotaExceeded'
        '500':
          $ref: '#/components/responses/InternalError'

    get:
      operationId: listWorkers
      summary: List all registered workers for the tenant
      security:
        - WorkerJWTAuth: []
      responses:
        '200':
          description: List of workers.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkerListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/internal/tokens/tenant:
    post:
      operationId: mintWorkerToken
      summary: Mint a per-tenant scoped worker JWT (issue #491)
      description: |
        Issues a short-lived HS256 JWT scoped to one tenant. Requires
        a valid worker bearer JWT (any scope, including the
        bootstrap-issued wildcard). The minted token is signed with
        the active kid and verifies via the standard
        WorkerJWTAuth middleware.

        Constraint: only tenants currently in worker_status.apps
        with status='running' for this worker_id may be requested
        (issue #491 #2). A worker whose heartbeat has not yet landed
        cannot mint for ANY tenant.

        Refusal-to-mint-wildcard: tenant_id="*" (and "", and any
        value failing the charset check) is rejected with 400.
      security:
        - WorkerJWTAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkerTokenRequest'
      responses:
        '200':
          description: Token issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkerTokenResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: |
            Worker is not currently hosting the requested tenant
            (issue #491 constraint #2; body explains denial).
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/QuotaExceeded'
        '500':
          $ref: '#/components/responses/InternalError'

parameters:
  appName:
    name: appName
    in: path
    required: true
    schema:
      type: string
    description: Unique name of the app within the tenant.
