database:
  host: "localhost"
  port: 5432
  user: "edgecloud"
  password: "edgecloud"
  name: "edgecloud"
  sslmode: "disable"

nats:
  url: "nats://localhost:4222"

app:
  host: "0.0.0.0"
  port: 8080
  env: "development"

storage:
  artifact_path: "/var/edgecloud/registry"

jwt:
  secret: "this-is-a-valid-dev-secret-for-local-testing"
  ttl_hours: 24
  issuer: "edgecloud"

rate_limit:
  tenant_rate: 200
  tenant_burst: 300
  ip_rate: 20
  ip_burst: 40

migration:
  edge_migrate_path: "edge-migrate"
  wasi_sdk_path: "/usr/local/wasi-sdk/bin"

# Cluster autoscaler (issue #85). Disabled by default.
autoscale:
  enabled: false
  min_workers: 2
  max_workers: 50
  target_headroom_pct: 20
  scale_up_cooldown_s: 60
  scale_down_cooldown_s: 300
  decision_interval_s: 30
  provider_kind: "noop"

# region is this control plane's own region. Used as the default for
# deployments that don't specify `?regions=`. Defaults to "global" if
# unset (which works with the wildcard NATS subject edgecloud.tasks.>).
# Override via CONTROL_PLANE_REGION env var. See issue #82.
# region: "global"
