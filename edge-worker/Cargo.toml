[package]
name = "edge-worker"
version = "0.1.0"
edition = "2021"
rust-version = "1.85"

[lib]
name = "edge_worker"
path = "src/lib.rs"

[dependencies]
async-nats = { version = "0.49", features = ["jetstream", "nkeys"] }
async-trait = "0.1"
tokio = { version = "1.45", features = ["full"] }
reqwest = { version = "0.12", features = ["json", "rustls-tls"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
anyhow = "1.0"
thiserror = "2.0"
bytes = "1.0"
futures = "0.3"
chrono = "0.4"
edge-runtime = { path = "../edge-runtime" }
wasmtime = { version = "25.0", features = ["component-model", "async"] }

[dev-dependencies]
tokio-test = "0.4"
testcontainers = { version = "0.27", features = ["blocking"] }
testcontainers-modules = { version = "0.15", features = ["nats"] }
wiremock = "0.6"