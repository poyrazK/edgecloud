# Local development infrastructure for edgeCloud.
#
# Spins up Postgres 16 and NATS 2.10 (with JetStream) — the two services
# the control plane and worker require. Versions match the CI test
# containers exactly (see `.github/workflows/ci.yml` →
# `go-test-integration.services.postgres` and the `nats:2.10-alpine`
# image used by `internal/autoscale/regression_test.go`), so a
# migration or code change that passes locally will pass in CI and
# vice versa.
#
# Usage:
#   cp .env.example .env    # one-time (`.env` is gitignored)
#   make infra-up           # sources .env, starts Postgres + NATS
#   docker compose up -d    # same, without the Makefile wrapper
#
# `POSTGRES_PASSWORD` is intentionally NOT set here — compose strict-
# fails via `${VAR:?msg}` if it's missing from the environment, so
# the literal default cannot leak into a non-local deployment. The
# control plane binary additionally rejects known-placeholder
# passwords at startup (see edge-control-plane/internal/config/config.go).

services:
  postgres:
    image: postgres:16-alpine
    container_name: edgecloud-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-edgecloud}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set; copy .env.example to .env}
      POSTGRES_DB: ${POSTGRES_DB:-edgecloud}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # pg_isready is built into the official postgres image. Same
      # check the CI healthcheck uses (services: postgres in ci.yml).
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-edgecloud} -d ${POSTGRES_DB:-edgecloud}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  nats:
    image: nats:2.10-alpine
    container_name: edgecloud-nats
    # -js enables JetStream. The control plane publishes NATS
    # JetStream messages (edgecloud.tasks.<region>,
    # edgecloud.heartbeats.<region>) — without -js those publishes
    # would fail with "no stream configured". -m 8222 turns on the
    # HTTP monitoring endpoint on :8222 so the healthcheck can hit
    # /healthz.
    command: ["nats-server", "-js", "-m", "8222"]
    ports:
      - "4222:4222"   # NATS client traffic
      - "8222:8222"   # HTTP monitoring endpoint
    healthcheck:
      # wget is part of the nats:2.10-alpine image (Alpine base).
      # Hit the monitoring endpoint's /healthz; non-200 = unhealthy.
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  pgdata:
    # Named volume so `docker compose down` (without -v) keeps the
    # schema. `make infra-reset` does the down -v + re-apply dance.
    name: edgecloud-pgdata