[default]
extend-words = [
    "edgecloud",
    "edgeclouderz",
    "wasmtime",
    "wasi",
    "clippy",
    "gofmt",
    "golangci",
    "staticcheck",
    "errcheck",
    "govet",
    "ineffassign",
    "typecheck",
    "unparseable",
    # Pre-existing entries below — kept verbatim from the file's
    # pre-PR state so the typos run continues to allow the same
    # identifiers it did before this PR.
    "ture",
    "inser",
    "alue",
]
# Files excluded from spell-checking. Reasons:
# - signer_test.go: pins a well-known Ed25519 base64url signature
#   fixture whose random bytes (e.g. "HVEA", "HAA") coincidentally
#   look like English words. The test failure mode is caught by
#   the deterministic-signature test case; the typos run
#   conflicts without removing real word-check coverage.
extend-ignore-re = [
    "edge-control-plane/internal/signing/signer_test\\.go",
]